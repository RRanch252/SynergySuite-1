 role=\"table\" style=\"margin-top:16px;\">\n        <div role=\"row\" style=\"display:grid;grid-template-columns:1.5fr 1.2fr 78px 118px;gap:10px;padding:0 2px 9px;border-bottom:1px solid #efe9dd;\">\n          <span role=\"columnheader\" style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;\">Vendor and items<\u002Fspan>\n          <span role=\"columnheader\" style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;\">Delivery<\u002Fspan>\n          <span role=\"columnheader\" style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;text-align:right;\">Value<\u002Fspan>\n          <span role=\"columnheader\" style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;text-align:right;\">Status<\u002Fspan>\n        <\u002Fdiv>\n        <sc-for list=\"{{orderRows}}\" as=\"o\" hint-placeholder-count=\"4\">\n          <div role=\"row\" style=\"display:grid;grid-template-columns:1.5fr 1.2fr 78px 118px;gap:10px;align-items:center;padding:12px 2px;border-bottom:1px solid #f3efe6;\">\n            <div role=\"cell\" style=\"min-width:0;\">\n              <div style=\"font-size:13.5px;font-weight:600;color:#15293f;\">{{o.vendor}}<\u002Fdiv>\n              <div style=\"font-size:11.5px;color:#8a94a0;margin-top:1px;\">{{o.items}}<\u002Fdiv>\n              <sc-if value=\"{{o.hasFlag}}\" hint-placeholder-val=\"{{false}}\">\n                <div style=\"font-size:11.5px;color:#b6831f;margin-top:3px;\">{{o.flag}}<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div role=\"cell\" style=\"font-size:12.5px;color:#3c4a5a;min-width:0;\">{{o.when}}<\u002Fdiv>\n            <div role=\"cell\" style=\"text-align:right;\"><span class=\"cs\" style=\"font-size:13.5px;font-weight:700;color:#15293f;\">{{o.val}}<\u002Fspan><\u002Fdiv>\n            <div role=\"cell\" style=\"text-align:right;\"><span style=\"font-size:11.5px;font-weight:600;color:{{o.statusColor}};background:{{o.statusBg}};border-radius:5px;padding:3px 8px;white-space:nowrap;\">{{o.status}}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"font-size:12px;color:#a3a9b1;margin-top:14px;line-height:1.45;\">Every order is matched against its purchase order on delivery. Short deliveries and substitutions are flagged and a credit is raised automatically.<\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== SUPPLIER INTELLIGENCE ===== -->\n    <section aria-label=\"Supplier intelligence\" hidden=\"{{s4Hidden}}\" style=\"order:{{ordSupplier}};grid-column:{{spanSupplier}};background:#fff;border:1px solid #e6e0d4;border-radius:9px;padding:20px 22px;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;\">\n        <div class=\"cs\" style=\"font-size:18px;font-weight:700;color:#15293f;\">Suppliers<\u002Fdiv>\n        <span style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#2f6b4f;background:#eaf1ed;border:1px solid #cfe1d6;border-radius:5px;padding:3px 8px;\">Live data<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"cs\" style=\"font-size:15.5px;font-weight:600;color:#15293f;margin-top:9px;\">{{supplier.headline}}<\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#8a94a0;margin-top:2px;\">{{supplier.sub}}<\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1.55fr 1fr;gap:22px;margin-top:16px;align-items:start;\">\n        <!-- LEFT: vendor comparison -->\n        <div role=\"table\" style=\"min-width:0;\">\n          <div role=\"row\" style=\"display:grid;grid-template-columns:1.4fr 96px 96px 64px;gap:10px;padding:0 8px 9px;border-bottom:1px solid #efe9dd;\">\n            <span role=\"columnheader\" style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;\">Vendor<\u002Fspan>\n arget}} <span style=\"font-weight:600;color:#b6831f;\">{{dist.gap}}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n\n          <svg sc-camel-view-box=\"0 0 440 210\" width=\"100%\" style=\"display:block;margin-top:10px;overflow:visible;\" role=\"img\" aria-label=\"{{dist.alt}}\">\n            <line x1=\"24\" y1=\"170\" x2=\"424\" y2=\"170\" stroke=\"#e6e0d4\" stroke-width=\"1\"><\u002Fline>\n            <sc-for list=\"{{dist.bars}}\" as=\"b\" hint-placeholder-count=\"7\">\n              <rect x=\"{{b.x}}\" y=\"{{b.y}}\" width=\"{{b.w}}\" height=\"{{b.h}}\" rx=\"2.5\" fill=\"{{b.fill}}\"><\u002Frect>\n            <\u002Fsc-for>\n            <polyline points=\"{{dist.curve}}\" fill=\"none\" stroke=\"#2f6b4f\" stroke-width=\"2.4\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n            <!-- target line -->\n            <line x1=\"{{dist.targetX}}\" y1=\"22\" x2=\"{{dist.targetX}}\" y2=\"170\" stroke=\"#bf8a2e\" stroke-width=\"1.5\" stroke-dasharray=\"5 4\"><\u002Fline>\n            <text x=\"{{dist.targetLabelX}}\" y=\"14\" text-anchor=\"start\" font-size=\"10\" font-weight=\"600\" fill=\"#bf8a2e\">target<\u002Ftext>\n            <!-- mean line -->\n            <line x1=\"{{dist.meanX}}\" y1=\"22\" x2=\"{{dist.meanX}}\" y2=\"170\" stroke=\"#15293f\" stroke-width=\"1.5\"><\u002Fline>\n            <text x=\"{{dist.meanLabelX}}\" y=\"14\" text-anchor=\"end\" font-size=\"10\" font-weight=\"600\" fill=\"#15293f\">avg<\u002Ftext>\n            <sc-for list=\"{{dist.axis}}\" as=\"a\" hint-placeholder-count=\"4\">\n              <text x=\"{{a.x}}\" y=\"188\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#8a94a0\">{{a.label}}<\u002Ftext>\n            <\u002Fsc-for>\n            <text x=\"224\" y=\"206\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#a3a9b1\">Gross profit per {{dist.unit}}<\u002Ftext>\n          <\u002Fsvg>\n\n          <div style=\"display:flex;flex-wrap:wrap;gap:9px 16px;margin-top:6px;\">\n            <span style=\"display:flex;align-items:center;gap:6px;font-size:11.5px;color:#6f7d8c;\"><span aria-hidden=\"true\" style=\"width:11px;height:11px;border-radius:3px;background:#cfe0d5;\"><\u002Fspan>Tickets in band<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:6px;font-size:11.5px;color:#6f7d8c;\"><span aria-hidden=\"true\" style=\"width:11px;height:11px;border-radius:3px;background:#f1ddc2;\"><\u002Fspan>Below break even<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:6px;font-size:11.5px;color:#6f7d8c;\"><span aria-hidden=\"true\" style=\"width:14px;height:0;border-top:2.4px solid #2f6b4f;\"><\u002Fspan>Distribution<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== UPSELL PROMPTS ===== -->\n    <section aria-label=\"Upsell prompts\" hidden=\"{{s5Hidden}}\" style=\"order:{{ordUpsell}};grid-column:{{spanUpsell}};background:#fff;border:1px solid #e6e0d4;border-radius:9px;padding:20px 22px;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;\">\n        <div class=\"cs\" style=\"font-size:18px;font-weight:700;color:#15293f;\">Upsell prompts<\u002Fdiv>\n        <span style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#2f6b4f;background:#eaf1ed;border:1px solid #cfe1d6;border-radius:5px;padding:3px 8px;\">Live data<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#8a94a0;margin-top:2px;\">{{upsellSub}}<\u002Fdiv>\n      <div style=\"margin-top:14px;display:flex;flex-direction:column;gap:1px;\">\n        <sc-for list=\"{{upsell}}\" as=\"u\" hint-placeholder-count=\"4\">\n          <div style=\"display:flex;align-items:center;gap:12px;padding:11px 2px;border-bottom:1px solid #f3efe6;\">\n            <span aria-hidden=\"true\" style=\"flex:none;width:32px;height:32px;border-radius:8px;background:#eaf1ed;color:#2f6b4f;display:inline-flex;align-items:center;justify-content:center;\">{{plusIcon}}<\u002Fspan>\n            <div style=\"min-width:0;flex:1;\">\n              <div style=\"font-size:14px;font-weight:600;color:#15293f;\">{{u.name}}<\u002Fdiv>\n              <div style=\"font-size:12px;color:#8a94a0;\">{{u.note}}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"text-align:right;flex:none;\">\n              <div class=\"cs\" style=\"font-size:15px;font-weight:700;color:#2f6b4f;\">{{u.gp}}<\u002Fdiv>\n              <div style=\"font-size:10.5px;color:#a3a9b1;\">GP each<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"font-size:12px;color:#8a94a0;margin-top:14px;padding-top:12px;border-top:1px solid #efe9dd;\">Commissionable for floor staff. Attach target: a side on one in two tickets.<\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== PREDICTIVE VOLUMES ===== -->\n    <section aria-label=\"Predictive volumes\" hidden=\"{{s5Hidden}}\" style=\"order:{{ordVolumes}};grid-column:{{spanVolumes}};background:#fff;border:1px solid #e6e0d4;border-radius:9px;padding:20px 22px;\">\n      <div class=\"cs\" style=\"font-size:18px;font-weight:700;color:#15293f;\">Predictive volumes<\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#8a94a0;margin-top:2px;\">{{volSubtitle}}<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:16px;margin-top:16px;\">\n        <sc-for list=\"{{volumes}}\" as=\"v\" hint-placeholder-count=\"3\">\n          <div>\n            <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:8px;\">\n              <span style=\"font-size:14px;font-weight:600;color:#15293f;\">{{v.name}}<\u002Fspan>\n              <span style=\"font-size:12.5px;font-weight:600;color:{{v.deltaColor}};\">{{v.delta}}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:9px;margin-top:7px;\">\n              <span style=\"font-size:11px;color:#a3a9b1;width:34px;flex:n wrap;\">\n              <span style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#a3956f;\">Labour during the shift · Tuesday 1:07pm<\u002Fspan>\n              <span style=\"font-size:11px;font-weight:600;color:#2f6b4f;\">Closing toward target<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:flex-end;gap:24px;flex-wrap:wrap;margin-top:11px;\">\n              <div>\n                <div class=\"cs\" style=\"font-size:30px;font-weight:700;color:#b6831f;line-height:1;\">31%<\u002Fdiv>\n                <div style=\"font-size:12px;color:#6f7d8c;margin-top:4px;\">labour cost now, target 28%<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:1;min-width:200px;font-size:13px;color:#3c4a5a;line-height:1.5;\">Demand picks up at 1:30pm. Labour drops to about 27% without any change. No action needed unless it holds above 30% at 2pm.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-top:12px;border-left:3px solid #bf8a2e;background:#fcf6ea;padding:10px 13px;border-radius:0 8px 8px 0;\">\n              <div style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#b6831f;\">Overtime flag, 1 employee<\u002Fdiv>\n              <div style=\"font-size:13px;color:#3c4a5a;line-height:1.5;margin-top:4px;\">R. Connell is in hour 7 of a 7 hour shift. Past 7:30pm it posts overtime at 1.5x. Reminder set for 7:15pm.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"margin-top:16px;padding-top:15px;border-top:1px solid #efe9dd;\">\n          <div style=\"font-size:13.5px;color:#3c4a5a;line-height:1.5;\">The platform saves money on food cost and labour. There is a third question.<\u002Fdiv>\n          <button type=\"button\" sc-camel-on-click=\"{{goDepth}}\" style=\"margin-top:11px;border:none;border-radius:8px;background:#15293f;color:#fff;font-size:13.5px;font-weight:600;padding:11px 17px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">See why it is harder to leave →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsection>\n\n    <!-- ===== SEASONALITY & WEATHER ===== -->\n    <section aria-label=\"Seasonality and weather\" hidden=\"{{moreHidden}}\" style=\"order:{{ordSeason}};grid-column:{{spanSeason}};background:#fff;border:1px solid #e6e0d4;border-radius:9px;padding:20px 22px;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;\">\n        <div class=\"cs\" style=\"font-size:18px;font-weight:700;color:#15293f;\">Seasonality and weather<\u002Fdiv>\n        <span style=\"font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#bf8a2e;background:#faf2df;border:1px solid #ecdcb6;border-radius:5px;padding:3px 8px;\">Illustrative · needs integration<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- week strip -->\n      <sc-if value=\"{{isWeek}}\" hint-placeholder-val=\"{{true}}\">\n        <div style=\"display:flex;gap:6px;margin-top:16px;\">\n          <sc-for list=\"{{weatherDays}}\" as=\"d\" hint-placeholder-count=\"7\">\n            <div style=\"flex:1;text-align:center;background:{{d.bg}};border:1px solid {{d.border}};border-radius:9px;padding:10px 3px;\">\n              <div style=\"font-size:10.5px;color:#8a94a0;\">{{d.day}}<\u002Fdiv>\n              <div aria-hidden=\"true\" style=\"display:flex;justify-content:center;margin:7px 0;color:{{d.iconColor}};\">{{d.iconEl}}<\u002Fdiv>\n              <div style=\"font-size:12px;font-weight:600;color:#15293f;\">{{d.temp}}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-top:13px;\">\n          <sc-for list=\"{{seasonInputs}}\" as=\"ip\" hint-placeholder-count=\"3\">\n            <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:#8 ,60 90,58 150,62 210,78 270,92 330,84 390,70 450,62 500,60\" fill=\"none\" stroke=\"#2f6b4f\" stroke-width=\"3\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n          <circle cx=\"270\" cy=\"92\" r=\"4\" fill=\"#2f6b4f\"><\u002Fcircle>\n          <text x=\"270\" y=\"108\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"600\" fill=\"#2f6b4f\">GP low<\u002Ftext>\n          <text x=\"30\" y=\"172\" font-size=\"10.5\" fill=\"#8a94a0\">Jan<\u002Ftext>\n          <text x=\"265\" y=\"172\" text-anchor=\"middle\" font-size=\"10.5\" fill=\"#8a94a0\">Jul<\u002Ftext>\n          <text x=\"500\" y=\"172\" text-anchor=\"end\" font-size=\"10.5\" fill=\"#8a94a0\">Dec<\u002Ftext>\n        <\u002Fsvg>\n        <div style=\"display:flex;flex-wrap:wrap;gap:10px 18px;margin-top:8px;\">\n          <span style=\"display:flex;align-items:center;gap:7px;font-size:12.5px;color:#15293f;\"><span aria-hidden=\"true\" style=\"width:20px;height:0;border-top:3px solid #2f6b4f;\"><\u002Fspan>GP per ticket<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:7px;font-size:12.5px;color:#15293f;\"><span aria-hidden=\"true\" style=\"width:20px;height:0;border-top:2.4px solid #bf8a2e;\"><\u002Fspan>Input cost<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-top:13px;\">\n          <sc-for list=\"{{seasonInputs}}\" as=\"ip\" hint-placeholder-count=\"3\">\n            <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:#8a5a1e;background:#fbf2e6;border:1px solid #f0e2c8;border-radius:999px;padding:5px 11px;\"><span aria-hidden=\"true\" style=\"display:inline-flex;color:#bf8a2e;\">{{boltIconSm}}<\u002Fspan>{{ip.t}}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:flex-start;gap:10px;margin-top:13px;background:#fbf2ee;border:1px solid #f3ddd2;border-radius:8px;padding:12px 13px;\">\n          <span aria-hidden=\"true\" style=\"flex:none;margin-top:1px;color:#c2691d;\">{{historyIcon}}<\u002Fspan>\n          <div style=\"font-size:13.5px;color:#3c4a5a;line-height:1.5;\">{{season.seasonNote}}<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{hasGroupNote}}\" hint-placeholder-val=\"{{false}}\">\n          <div style=\"display:flex;align-items:flex-start;gap:10px;margin-top:10px;background:#eef3fb;border:1px solid #d8e3f5;border-radius:8px;padding:12px 13px;\">\n            <span aria-hidden=\"true\" style=\"flex:none;margin-top:1px;color:#2f6bd8;\">{{groupIcon}}<\u002Fspan>\n            <div style=\"font-size:13.5px;color:#27425e;line-height:1.5;\">{{season.groupNote}}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsc-if>\n    <\u002Fsection>\n\n    <!-- ===== FOOTFALL ===== -->\n    <section aria-label=\"Travel and event footfall\" hidden=\"{{s1Hidden}}\" style=\"order:{{ordFootfall}};grid-column:{{spanFootfall}};background:#fff;border:1px solid #e6e0d4;border-radius:9px;padding:20px 22px;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;\">\n        <div class=\"cs\" style=\"font-size:18px;font-weight:700;color:#15293f;\">Footfall drivers<\u002Fdiv>\n        <span style=\"font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#bf8a2e;background:#faf2df;border:1px solid #ecdcb6;border-radius:5px;padding:3px 8px;\">Illustrative<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#8a94a0;margin-top:2px;\">{{footfallSub}}<\u002Fdiv>\n      <svg sc-camel-view-box=\"0 0 720 196\" width=\"100%\" style=\"display:block;margin-top:14px;overflow:visible;\" role=\"img\" aria-label=\"{{footfallAlt}}\">\n        <line x1=\"22\" y1=\"150\" x2=\"700\" y2=\"150\" stroke=\"#e6e0d4\" stroke-width=\"1\"><\u002Fline>\n        <!-- surge band on Saturday -->\n        <rect x=\"{{ff.eventX}}\" y=\"20\" width=\"74\" height=\"130\" fill=\"#f3edfb\" opacity=\"0.6\"><\u002Frect>\n        <!-- last year -->\n        <polyline points=\"{{ff.lastYear}}\" fill=\"none\" stroke=\"#c4b8d8\" stroke-width=\"2\" stroke-dasharray=\"4 4\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n        <!-- last week -->\n        <polyline points=\"{{ff.lastWeek}}\" fill=\"none\" stroke=\"#aeb4bb\" stroke-width=\"2\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n        <!-- this week plan with surge -->\n        <polyline points=\"{{ff.plan}}\" fill=\"none\" stroke=\"#2f6b4f\" stroke-width=\"3.2\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n        <!-- event marker up -->\n        <circle cx=\"{{ff.eventCx}}\" cy=\"{{ff.eventCy}}\" r=\"4.5\" fill=\"#7a4fc0\"><\u002Fcircle>\n        <text x=\"{{ff.eventCx}}\" y=\"{{ff.eventLabelY}}\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"600\" fill=\"#7a4fc0\">{{ff.eventLabel}}<\u002Ftext>\n        <!-- weather marker down -->\n        <circle cx=\"{{ff.weatherCx}}\" cy=\"{{ff.weatherCy}}\" r=\"4.5\" fill=\"#c2691d\"><\u002Fcircle>\n        <text x=\"{{ff.weatherCx}}\" y=\"{{ff.weatherLabelY}}\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"600\" fill=\"#c2691d\">{{ff.weatherLabel}}<\u002Ftext>\n        <sc-for list=\"{{ff.dayLabels}}\" as=\"d\" hint-placeholder-count=\"7\">\n          <text x=\"{{d.x}}\" y=\"166\" text-anchor=\"middle\" font-size=\"11\" fill=\"#8a94a0\">{{d.label}}<\u002Ftext>\n        <\u002Fsc-for>\n      <\u002Fsvg>\n      <div style=\"display:flex;flex-wrap:wrap;gap:9px 16px;margin-top:8px;\">\n        <span style=\"display:flex;align-items:center;gap:7px;font-size:12px;color:#15293f;\"><span aria-hidden=\"true\" style=\"width:18px;height:0;border-top:3px solid #2f6b4f;\"><\u002Fspan>This week plan<\u002Fspan>\n        <span style=\"display:flex;align-items:center;gap:7px;font-size:12px;color:#15293f;\"><span aria-hidden=\"true\" style=\"width:18px;height:0;border-top:2px solid #aeb4bb;\"><\u002Fspan>Last week<\u002Fspan>\n        <span style=\"display:flex;align-items:center;gap:7px;font-size:12px;color:#15293f;\"><span aria-hidden=\"true\" style=\"width:18px;height:0;border-top:2px dashed #c4b8d8;\"><\u002Fspan>Last year<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:7px;margin-top:13px;\">\n        <sc-for list=\"{{footfallNotes}}\" as=\"n\" hint-placeholder-count=\"2\">\n          <div style=\"display:flex;align-items:center;gap:9px;\">\n            <span aria-hidden=\"true\" style=\"flex:none;width:26px;height:26px;border-radius:7px;background:{{n.tileBg}};color:{{n.color}};display:inline-flex;align-items:center;justify-content:center;\">{{n.iconEl}}<\u002Fspan>\n            <span style=\"font-size:12.5px;color:#3c4a5a;flex:1;min-width:0;\">{{n.text}}<\u002Fspan>\n            <span class=\"cs\" style=\"flex:none;font-size:14px;font-weight:700;color:{{n.color}};\">{{n.impact}}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:flex-start;gap:9px;margin-top:12px;padding-top:12px;border-top:1px solid #efe9dd;\">\n        <span aria-hidden=\"true\" style=\"flex:none;margin-top:1px;color:#2f6b4f;\">{{bulbIcon}}<\u002Fspan>\n        <div style=\"font-size:13px;font-weight:500;color:#2c4a39;line-height:1.45;\">{{footfallSoWhat}}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== PROMOTIONS ===== -->\n    <section aria-label=\"Promotions\" hidden=\"{{moreHidden}}\" style=\"order:{{ordPromos}};grid-column:{{spanPromos}};background:#fff;border:1px solid #e6e0d4;border-radius:9px;padding:20px 22px;\">\n      <div class=\"cs\" style=\"font-size:18px;font-weight:700;color:#15293f;\">Promotions<\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#8a94a0;margin-top:2px;\">Corporate approved, with forecast impact.<\u002Fdiv>\n      <div style=\"display:flex;gap:11px;margin-top:14px;flex-wrap:wrap;\">\n        <sc-for list=\"{{promotions}}\" as=\"p\" hint-placeholder-count=\"2\">\n          <div style=\"flex:1;min-width:260px;border:1px solid #ece6d9;border-radius:9px;padding:14px 15px;\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;\">\n              <div style=\"font-size:14.5px;font-weight:600;color:#15293f;\">{{p.name}}<\u002Fdiv>\n              <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#2f6b4f;background:#eaf1ed;border:1px solid #cfe1d6;border-radius:5px;padding:3px 8px;\">{{checkIconSm}} Approved<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#8a94a0;margin-top:3px;\">{{p.window}}<\u002Fdiv>\n            <div style=\"display:flex;gap:16px;margin-top:11px;flex-wrap:wrap;\">\n              <div><div style=\"font-size:11px;color:#a3a9b1;\">Covers lift<\u002Fdiv><div class=\"cs\" style=\"font-size:16px;font-weight:700;color:#15293f;margin-top:1px;\">{{p.lift}}<\u002Fdiv><\u002Fdiv>\n              <div><div style=\"font-size:11px;color:#a3a9b1;\">Net gross profit<\u002Fdiv><div class=\"cs\" style=\"font-size:16px;font-weight:700;color:#2f6b4f;margin-top:1px;\">{{p.gp}}<\u002Fdiv><\u002Fdiv>\n              <div><div style=\"font-size:11px;color:#a3a9b1;\">Stock to ready<\u002Fdiv><div class=\"cs\" style=\"font-size:16px;font-weight:700;color:{{p.stockColor}};margin-top:1px;\">{{p.stock}}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:12px;color:#8a94a0;margin-top:9px;padding-top:9px;border-top:1px solid #f3efe6;\">{{p.cost}}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== INDUSTRY BENCHMARKS ===== -->\n    <section aria-label=\"Industry benchmarks\" hidden=\"{{moreHidden}}\" style=\"order:{{ordBench}};grid-column:{{spanBench}};background:#fff;border:1px solid #e6e0d4;border-radius:9px;padding:20px 22px;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;\">\n        <div style=\"display:flex;align-items:center;gap:8px;\">\n          <span aria-hidden=\"true\" style=\"color:#6f7d8c;display:inline-flex;\">{{globeIcon}}<\u002Fspan>\n          <span class=\"cs\" style=\"font-size:18px;font-weight:700;color:#15293f;\">How you compare<\u002Fspan>\n        <\u002Fdiv>\n        <span style=\"font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#bf8a2e;background:#faf2df;border:1px solid #ecdcb6;border-radius:5px;padding:3px 7px;\">Industry data · illustrative<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#8a94a0;margin-top:2px;\">Your numbers against target and the industry, plus commodities to watch.<\u002Fdiv>\n\n      <div style=\"display:flex;gap:26px;margin-top:15px;flex-wrap:wrap;\">\n        <!-- KPI variance table -->\n        <div style=\"flex:1.3;min-width:340px;\">\n          <div role=\"table\" aria-label=\"KPIs versus industry\">\n            <div role=\"row\" style=\"display:grid;grid-template-columns:1.4fr 0.8fr 0.8fr 0.8fr 0.9fr;gap:8px;padding:0 2px 8px;border-bottom:1px solid #efe9dd;\">\n              <span role=\"columnheader\" style=\"font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;\">KPI<\u002Fspan>\n              <span role=\"columnheader\" style=\"font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;text-align:right;\">You<\u002Fspan>\n              <span role=\"columnheader\" style=\"font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;text-align:right;\">Target<\u002Fspan>\n              <span role=\"columnheader\" style=\"font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;text-align:right;\">Industry<\u002Fspan>\n              <span role=\"columnheader\" style=\"font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;text-align:right;\">vs Ind.<\u002Fspan>\n            <\u002Fdiv>\n            <sc-for list=\"{{benchmarks}}\" as=\"b\" hint-placeholder-count=\"6\">\n              <div role=\"row\" style=\"display:grid;grid-template-columns:1.4fr 0.8fr 0.8fr 0.8fr 0.9fr;gap:8px;align-items:center;padding:9px 2px;border-bottom:1px solid #f3efe6;\">\n                <span role=\"cell\" style=\"font-size:13px;font-weight:500;color:#15293f;\">{{b.kpi}}<\u002Fspan>\n                <span role=\"cell\" class=\"cs\" style=\"font-size:13.5px;font-weight:700;color:#15293f;text-align:right;\">{{b.you}}<\u002Fspan>\n                <span role=\"cell\" style=\"font-size:12.5px;color:#8a94a0;text-align:right;\">{{b.target}}<\u002Fspan>\n                <span role=\"cell\" style=\"font-size:12.5px;color:#8a94a0;text-align:right;\">{{b.industry}}<\u002Fspan>\n                <span role=\"cell\" style=\"text-align:right;\"><span style=\"font-size:11.5px;font-weight:600;color:{{b.vsColor}};background:{{b.vsBg}};border-radius:5px;padding:2px 7px;white-space:nowrap;\">{{b.vsArrow}} {{b.vs}}<\u002Fspan><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#a3a9b1;margin-top:12px;\">Variance is against the industry median for comparable outlets. Green means ahead, amber means behind.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Commodity watch -->\n        <div style=\"flex:1;min-width:300px;\">\n          <div style=\"font-size:11.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#a3956f;\">Commodity watch<\u002Fdiv>\n          <div style=\"font-size:12px;color:#8a94a0;margin-top:2px;\">Where today sits against the normal price range.<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:11px;margin-top:13px;\">\n            <sc-for list=\"{{commodities}}\" as=\"c\" hint-placeholder-count=\"4\">\n              <div>\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;\">\n                  <span style=\"font-size:13px;font-weight:600;color:#15293f;\">{{c.name}} <span style=\"font-weight:400;color:#8a94a0;\">{{c.price}}<\u002Fspan><\u002Fspan>\n                  <span style=\"font-size:11px;font-weight:600;color:{{c.color}};background:{{c.bg}};border-radius:5px;padding:2px 8px;white-space:nowrap;\">{{c.sd}} {{c.stateLabel}}<\u002Fspan>\n                <\u002Fdiv>\n                <svg sc-camel-view-box=\"0 0 260 16\" width=\"100%\" height=\"16\" style=\"display:block;margin-top:6px;\" role=\"img\" aria-label=\"{{c.alt}}\">\n                  <rect x=\"0\" y=\"6\" width=\"260\" height=\"4\" rx=\"2\" fill=\"#f1ece1\"><\u002Frect>\n                  <rect x=\"{{c.bandX}}\" y=\"6\" width=\"{{c.bandW}}\" height=\"4\" rx=\"2\" fill=\"#dfe6df\"><\u002Frect>\n                  <line x1=\"130\" y1=\"3\" x2=\"130\" y2=\"13\" stroke=\"#c4c8d0\" stroke-width=\"1\"><\u002Fline>\n                  <circle cx=\"{{c.dotX}}\" cy=\"8\" r=\"5\" fill=\"{{c.color}}\"><\u002Fcircle>\n                <\u002Fsvg>\n                <div style=\"font-size:12px;color:#6f7d8c;line-height:1.4;margin-top:5px;\">{{c.note}}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:9px 14px;margin-top:12px;padding-top:11px;border-top:1px solid #efe9dd;\">\n            <span style=\"display:flex;align-items:center;gap:6px;font-size:11px;color:#6f7d8c;\"><span aria-hidden=\"true\" style=\"width:10px;height:10px;border-radius:50%;background:#dfe6df;\"><\u002Fspan>Normal range, plus or minus one band<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:6px;font-size:11px;color:#6f7d8c;\"><span aria-hidden=\"true\" style=\"width:10px;height:10px;border-radius:50%;background:#b23a2e;\"><\u002Fspan>Expensive<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n\n  <!-- ===================== FOOTER ===================== -->\n  <p style=\"margin:24px 2px 0;font-size:12.5px;line-height:1.6;color:#a3a9b1;max-width:820px;\">Ordering, waste, inventory, volumes and unit economics come from the demand engine, your recipes and live inventory. Weather, footfall and seasonality inputs are illustrative and depend on an integration. Promotions are set and approved by corporate. Industry notes are sourced externally.<\u002Fp>\n  <div style=\"margin-top:18px;padding-top:16px;border-top:1px solid #e0d8c9;\">\n    <a href=\"https://niallfogarty.github.io/invrt-share/AI%20Agent%20Console%20(Standalone).html\" target=\"_blank\" rel=\"noopener\" style=\"font-size:13.5px;font-weight:600;color:#6f7d8c;text-decoration:none;\" style-hover=\"text-decoration:underline;\">Agent console →<\u002Fa>\n  <\u002Fdiv>\n <\u002Fdiv>\n <\u002Fsc-if>\n\n <!-- ===================== PLATFORM DEPTH ===================== -->\n <sc-if value=\"{{isDepth}}\" hint-placeholder-val=\"{{false}}\">\n <div data-screen-label=\"Platform depth\" style=\"max-width:1040px;margin:0 auto;padding:18px 30px 64px;\">\n   <button type=\"button\" sc-camel-on-click=\"{{setView}}\" data-view=\"full\" style=\"border:1px solid #e0d8c9;background:#fff;border-radius:9px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:#6f7d8c;padding:8px 13px;margin-bottom:20px;\" style-hover=\"background:#f7f4ee;\">← Back to the full picture<\u002Fbutton>\n\n   <div style=\"font-size:11.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#a3956f;\">Platform depth<\u002Fdiv>\n   <div class=\"cs\" style=\"font-size:25px;font-weight:700;color:#15293f;margin-top:5px;max-width:720px;line-height:1.25;\">Why this is harder to leave than it is to buy<\u002Fdiv>\n\n   <div role=\"tablist\" style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:20px;\">\n     <sc-for list=\"{{depthPills}}\" as=\"p\" hint-placeholder-count=\"4\">\n       <button type=\"button\" role=\"tab\" aria-selected=\"{{p.on}}\" sc-camel-on-click=\"{{setDepthTab}}\" data-tab=\"{{p.key}}\" style=\"border:1px solid #e0d8c9;cursor:pointer;font-family:inherit;font-size:11.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:9px 15px;border-radius:999px;background:{{p.bg}};color:{{p.fg}};\">{{p.label}}<\u002Fbutton>\n     <\u002Fsc-for>\n   <\u002Fdiv>\n\n   <!-- RECIPE DNA -->\n   <sc-if value=\"{{depthRecipe}}\" hint-placeholder-val=\"{{true}}\">\n     <div style=\"margin-top:22px;background:#fff;border:1px solid #e6e0d4;border-radius:11px;padding:26px 28px;\">\n       <div class=\"cs\" style=\"font-size:21px;font-weight:700;color:#15293f;\">What one sale depletes<\u002Fdiv>\n       <div style=\"font-size:13.5px;color:#6f7d8c;margin-top:5px;\">Classic chicken burger, traced through every ingredient the platform deducts from stock.<\u002Fdiv>\n       <div style=\"margin-top:22px;max-width:560px;\">\n         <sc-for list=\"{{recipeChain}}\" as=\"r\" hint-placeholder-count=\"7\">\n           <div style=\"display:grid;grid-template-columns:18px 1fr;gap:16px;\">\n             <div style=\"display:flex;flex-direction:column;align-items:center;\">\n               <div style=\"width:11px;height:11px;border-radius:50%;background:#fff;border:2px solid #2f6b4f;margin-top:18px;flex:none;\"><\u002Fdiv>\n               <sc-if value=\"{{r.notLast}}\" hint-placeholder-val=\"{{true}}\">\n                 <div style=\"flex:1;width:2px;background:#e6e0d4;margin:3px 0;\"><\u002Fdiv>\n               <\u002Fsc-if>\n             <\u002Fdiv>\n             <div style=\"padding-bottom:10px;\">\n               <div style=\"background:#faf8f3;border:1px solid #eee9dd;border-radius:9px;padding:12px 15px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;\">\n                 <div style=\"min-width:0;\">\n                   <div style=\"font-size:14.5px;font-weight:600;color:#15293f;\">{{r.name}}<\u002Fdiv>\n                   <div style=\"font-size:11.5px;color:#8a94a0;margin-top:2px;\">{{r.rule}} · yield {{r.yield}}<\u002Fdiv>\n                 <\u002Fdiv>\n                 <span class=\"cs\" style=\"flex:none;font-size:16px;font-weight:700;color:#15293f;\">{{r.qty}}<\u002Fspan>\n               <\u002Fdiv>\n             <\u002Fdiv>\n           <\u002Fdiv>\n         <\u002Fsc-for>\n       <\u002Fdiv>\n       <div style=\"font-size:13px;color:#6f7d8c;margin-top:6px;\">7 ingredients · 26 months of configuration · 104 verified counts<\u002Fdiv>\n       <div style=\"margin-top:20px;border-left:3px solid #bf8a2e;background:#fcf6ea;border-radius:0 10px 10px 0;padding:15px 18px;\">\n         <div style=\"font-size:14px;color:#3c4a5a;line-height:1.6;\">This depletion mapping is specific to your operation. The yield factors, costing rules and modifier configurations were set up over 26 months and verified against 104 weekly counts. Every outlet on your estate has its own version. Rebuilding it on a different platform would require starting from zero, outlet by outlet.<\u002Fdiv>\n       <\u002Fdiv>\n       <div style=\"font-size:12px;color:#a3a9b1;margin-top:14px;\">Configuration depth compounds with every count. It does not transfer.<\u002Fdiv>\n     <\u002Fdiv>\n   <\u002Fsc-if>\n\n   <!-- ESTATE UNIFICATION -->\n   <sc-if value=\"{{depthEstate}}\" hint-placeholder-val=\"{{false}}\">\n     <div style=\"margin-top:22px;background:#fff;border:1px solid #e6e0d4;border-radius:11px;padding:26px 28px;\">\n       <div style=\"display:grid;grid-template-columns:1fr 1px 1fr;gap:24px;\">\n         <div style=\"min-width:0;\">\n           <div style=\"font-size:11.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#15293f;\">{{euLeft.head}}<\u002Fdiv>\n           <div style=\"font-size:12px;color:#a3a9b1;margin-top:2px;\">{{euLeft.outlets}}<\u002Fdiv>\n           <div style=\"display:flex;flex-direction:column;gap:10px;margin-top:14px;\">\n             <sc-for list=\"{{euLeft.metrics}}\" as=\"m\" hint-placeholder-count=\"3\">\n               <div style=\"background:#faf8f3;border:1px solid #eee9dd;border-radius:9px;padding:12px 14px;\">\n                 <div style=\"font-size:11.5px;color:#8a94a0;\">{{m.k}}<\u002Fdiv>\n                 <div class=\"cs\" style=\"font-size:21px;font-weight:700;color:#15293f;margin-top:3px;\">{{m.v}}<\u002Fdiv>\n               <\u002Fdiv>\n             <\u002Fsc-for>\n           <\u002Fdiv>\n         <\u002Fdiv>\n         <div style=\"background:#eee9dd;width:1px;\"><\u002Fdiv>\n         <div style=\"min-width:0;\">\n           <div style=\"font-size:11.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#15293f;\">{{euRight.head}}<\u002Fdiv>\n           <div style=\"font-size:12px;color:#a3a9b1;margin-top:2px;\">{{euRight.outlets}}<\u002Fdiv>\n           <div style=\"display:flex;flex-direction:column;gap:10px;margin-top:14px;\">\n             <sc-for list=\"{{euRight.metrics}}\" as=\"m\" hint-placeholder-count=\"3\">\n               <div style=\"background:#faf8f3;border:1px solid #eee9dd;border-radius:9px;padding:12px 14px;\">\n                 <div style=\"font-size:11.5px;color:#8a94a0;\">{{m.k}}<\u002Fdiv>\n                 <div class=\"cs\" style=\"font-size:21px;font-weight:700;color:#15293f;margin-top:3px;\">{{m.v}}<\u002Fdiv>\n               <\u002Fdiv>\n             <\u002Fsc-for>\n           <\u002Fdiv>\n         <\u002Fdiv>\n       <\u002Fdiv>\n\n       <div style=\"margin-top:22px;padding-top:20px;border-top:1px solid #efe9dd;\">\n         <div style=\"font-size:11.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#2f6b4f;\">Estate total<\u002Fdiv>\n         <div style=\"display:grid;grid-template-columns:repeat(3, 1fr);gap:12px;margin-top:12px;\">\n           <sc-for list=\"{{euTotal}}\" as=\"m\" hint-placeholder-count=\"3\">\n             <div style=\"background:#f3f8f5;border:1px solid #cfe1d6;border-radius:9px;padding:13px 15px;\">\n               <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;\">\n                 <span style=\"font-size:11.5px;color:#5a6675;min-width:0;\">{{m.k}}<\u002Fspan>\n                 <span style=\"font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#bf8a2e;background:#fbf3e3;border-radius:4px;padding:2px 6px;flex:none;\">Directional<\u002Fspan>\n               <\u002Fdiv>\n               <div class=\"cs\" style=\"font-size:23px;font-weight:700;color:#15293f;margin-top:4px;\">{{m.v}}<\u002Fdiv>\n             <\u002Fdiv>\n           <\u002Fsc-for>\n         <\u002Fdiv>\n       <\u002Fdiv>\n\n       <div style=\"margin-top:22px;border-left:3px solid #bf8a2e;background:#fcf6ea;border-radius:0 10px 10px 0;padding:15px 18px;\">\n         <div style=\"font-size:14px;color:#3c4a5a;line-height:1.6;\">These two columns run on different payment systems with different data formats. Without this platform, they cannot be compared. This estate food cost view requires a manual spreadsheet built every week. This platform has unified this estate’s POS data since 2017. Every outlet, every format, one number.<\u002Fdiv>\n       <\u002Fdiv>\n       <div style=\"font-size:12px;color:#a3a9b1;margin-top:14px;\">POS agnostic since the first outlet. Mixed estate reporting from day one.<\u002Fdiv>\n     <\u002Fdiv>\n   <\u002Fsc-if>\n\n   <!-- AUDIT ANSWER -->\n   <sc-if value=\"{{depthAudit}}\" hint-placeholder-val=\"{{false}}\">\n     <div style=\"margin-top:22px;background:#fff;border:1px solid #e6e0d4;border-radius:11px;padding:26px 28px;\">\n       <div class=\"cs\" style=\"font-size:21px;font-weight:700;color:#15293f;\">Answer an audit in one file<\u002Fdiv>\n       <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px;\">\n         <div style=\"background:#faf8f3;border:1px solid #eee9dd;border-radius:9px;padding:13px 15px;\">\n           <div style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;\">Outlet<\u002Fdiv>\n           <div style=\"font-size:14px;color:#15293f;margin-top:4px;\">Outlet 47, Dublin City Centre<\u002Fdiv>\n         <\u002Fdiv>\n         <div style=\"background:#faf8f3;border:1px solid #eee9dd;border-radius:9px;padding:13px 15px;\">\n           <div style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;\">Date range<\u002Fdiv>\n           <div style=\"font-size:14px;color:#15293f;margin-top:4px;\">1 January 2026 to 31 March 2026<\u002Fdiv>\n         <\u002Fdiv>\n       <\u002Fdiv>\n       <div style=\"background:#faf8f3;border:1px solid #eee9dd;border-radius:9px;padding:13px 15px;margin-top:14px;\">\n         <div style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;\">Record types<\u002Fdiv>\n         <div style=\"font-size:14px;color:#15293f;margin-top:4px;\">Temperature logs, HACCP checks, Allergen verifications, Checklist completions<\u002Fdiv>\n       <\u002Fdiv>\n\n       <sc-if value=\"{{auditIdle}}\" hint-placeholder-val=\"{{true}}\">\n         <button type=\"button\" sc-camel-on-click=\"{{runAudit}}\" style=\"margin-top:18px;border:none;border-radius:8px;background:#15293f;color:#fff;font-size:13.5px;font-weight:600;padding:12px 18px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">Generate audit package<\u002Fbutton>\n       <\u002Fsc-if>\n       <sc-if value=\"{{auditRunning}}\" hint-placeholder-val=\"{{false}}\">\n         <div style=\"margin-top:18px;display:flex;align-items:center;gap:12px;\">\n           <span class=\"cs\" style=\"font-size:30px;font-weight:700;color:#15293f;\">{{auditCount}}s<\u002Fspan>\n           <span style=\"font-size:13.5px;color:#6f7d8c;\">Assembling records, every check accounted for...<\u002Fspan>\n         <\u002Fdiv>\n       <\u002Fsc-if>\n       <sc-if value=\"{{auditDone}}\" hint-placeholder-val=\"{{false}}\">\n         <div style=\"margin-top:18px;border-left:3px solid #2f6b4f;background:#f3f8f5;border-radius:0 10px 10px 0;padding:16px 18px;\">\n           <div style=\"display:flex;align-items:center;gap:8px;\">\n             <span aria-hidden=\"true\" style=\"display:inline-flex;\">{{checkIcon}}<\u002Fspan>\n             <span style=\"font-size:13px;font-weight:600;color:#1f3d2c;\">Audit package ready in 11 seconds<\u002Fspan>\n           <\u002Fdiv>\n           <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:13px;\">\n             <sc-for list=\"{{auditResults}}\" as=\"a\" hint-placeholder-count=\"4\">\n               <div style=\"display:grid;grid-template-columns:1fr auto auto;gap:14px;align-items:center;padding-bottom:9px;border-bottom:1px solid #e1ece5;\">\n                 <span style=\"font-size:13.5px;color:#15293f;min-width:0;\">{{a.label}}<\u002Fspan>\n                 <span class=\"cs\" style=\"font-size:13.5px;font-weight:700;color:#15293f;\">{{a.records}}<\u002Fspan>\n                 <span style=\"font-size:12px;font-weight:600;color:#2f6b4f;white-space:nowrap;\">{{a.pct}}<\u002Fspan>\n               <\u002Fdiv>\n             <\u002Fsc-for>\n           <\u002Fdiv>\n           <button type=\"button\" sc-camel-on-click=\"{{runAudit}}\" style=\"margin-top:14px;border:1px solid #cfe1d6;background:#fff;border-radius:8px;color:#2f6b4f;font-size:13px;font-weight:600;padding:10px 16px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#f3f8f5;\">Download audit package<\u002Fbutton>\n         <\u002Fdiv>\n       <\u002Fsc-if>\n\n       <div style=\"margin-top:22px;border-left:3px solid #bf8a2e;background:#fcf6ea;border-radius:0 10px 10px 0;padding:15px 18px;\">\n         <div style=\"font-size:14px;color:#3c4a5a;line-height:1.6;\">This outlet has 847 days of compliance records. Every temperature check, every checklist, every allergen verification. On demand, in one file, in eleven seconds. For a 200 outlet estate, a single failed audit can cost more than the annual subscription to this platform.<\u002Fdiv>\n       <\u002Fdiv>\n       <div style=\"font-size:12px;color:#a3a9b1;margin-top:14px;\">Records accumulate daily. The longer you are on the platform, the faster you pass an audit.<\u002Fdiv>\n     <\u002Fdiv>\n   <\u002Fsc-if>\n\n   <!-- DEPENDENCY MAP -->\n   <sc-if value=\"{{depthMap}}\" hint-placeholder-val=\"{{false}}\">\n     <div style=\"margin-top:22px;\">\n       <div class=\"cs\" style=\"font-size:22px;font-weight:700;color:#15293f;\">What this platform would cost to rebuild<\u002Fdiv>\n       <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px;\">\n         <sc-for list=\"{{depCards}}\" as=\"c\" hint-placeholder-count=\"5\">\n           <div style=\"background:#fff;border:1px solid #e6e0d4;border-radius:11px;padding:18px 20px;\">\n             <div style=\"font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#a3956f;\">{{c.cat}}<\u002Fdiv>\n             <div class=\"cs\" style=\"font-size:22px;font-weight:700;color:#15293f;margin-top:7px;line-height:1.15;\">{{c.stat}}<\u002Fdiv>\n             <div style=\"font-size:13px;color:#5a6675;margin-top:6px;line-height:1.5;\">{{c.sub}}<\u002Fdiv>\n             <div style=\"font-size:12.5px;color:#b23a2e;font-style:italic;margin-top:10px;line-height:1.5;\">{{c.cons}}<\u002Fdiv>\n           <\u002Fdiv>\n         <\u002Fsc-for>\n       <\u002Fdiv>\n       <div class=\"cs\" style=\"font-size:16px;color:#15293f;text-align:center;line-height:1.6;margin-top:24px;max-width:680px;margin-left:auto;margin-right:auto;\">The platform is the institutional memory of the business. Switching is not a commercial decision. It is a rebuild project.<\u002Fdiv>\n     <\u002Fdiv>\n   <\u002Fsc-if>\n <\u002Fdiv>\n <\u002Fsc-if>\n\n <!-- ===================== AGENT ANSWER PANEL ===================== -->\n <div aria-hidden=\"{{drawerHidden}}\" style=\"position:fixed;inset:0;z-index:60;pointer-events:{{drawerPointer}};\">\n   <div sc-camel-on-click=\"{{closeDrawer}}\" style=\"position:absolute;inset:0;background:rgba(21,41,63,.4);opacity:{{drawerOpacity}};transition:opacity .2s;\"><\u002Fdiv>\n   <div role=\"dialog\" aria-modal=\"true\" aria-label=\"Agent answer\" style=\"position:absolute;right:0;top:0;height:100%;width:460px;max-width:100%;background:#fff;box-shadow:-10px 0 36px rgba(21,41,63,.18);transform:{{drawerTransform}};transition:transform .24s ease;display:flex;flex-direction:column;\">\n     <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:20px 20px 16px;border-bottom:1px solid #eeebe3;\">\n       <div style=\"min-width:0;\">\n         <div style=\"font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#a3956f;\">Conversation<\u002Fdiv>\n         <div class=\"cs\" style=\"font-size:18px;font-weight:700;color:#15293f;line-height:1.3;margin-top:4px;\">{{drawer.title}}<\u002Fdiv>\n       <\u002Fdiv>\n       <button type=\"button\" sc-camel-on-click=\"{{closeDrawer}}\" aria-label=\"Close\" style=\"flex:none;width:32px;height:32px;border-radius:8px;border:1px solid #e6e0d4;background:#fff;color:#6f7d8c;font-size:18px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#f7f4ee;\">×<\u002Fbutton>\n     <\u002Fdiv>\n     <div data-panel-body=\"\" style=\"flex:1;overflow-y:auto;padding:18px 20px;\">\n       <sc-if value=\"{{panelHasCtx}}\" hint-placeholder-val=\"{{false}}\">\n         <div style=\"display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:#2f6b4f;background:#eef5f0;border:1px solid #cfe1d6;border-radius:999px;padding:5px 12px;margin-bottom:14px;\"><span aria-hidden=\"true\" style=\"width:7px;height:7px;border-radius:50%;background:#2f6b4f;\"><\u002Fspan> {{panelCtxLabel}} conversation<\u002Fdiv>\n       <\u002Fsc-if>\n       <sc-for list=\"{{convo}}\" as=\"d\" hint-placeholder-count=\"1\">\n       <div style=\"padding-top:{{d.turnPa 002Fdiv>\n           <sc-if value=\"{{d.hasRecAction}}\" hint-placeholder-val=\"{{false}}\">\n             <button type=\"button\" sc-camel-on-click=\"{{onChip}}\" data-q=\"{{d.recActionQ}}\" style=\"margin-top:14px;border:none;border-radius:9px;background:#15293f;color:#fff;font-size:13.5px;font-weight:600;padding:12px 18px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">{{d.recActionLabel}} →<\u002Fbutton>\n           <\u002Fsc-if>\n         <\u002Fdiv>\n       <\u002Fsc-if>\n       <sc-if value=\"{{d.canDownload}}\" hint-placeholder-val=\"{{false}}\">\n         <div style=\"margin-top:16px;padding-top:15px;border-top:1px solid #f1ede4;\">\n           <div style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;margin-bottom:9px;\">Take it with you<\u002Fdiv>\n           <div style=\"display:flex;flex-wrap:wrap;gap:8px;\">\n             <button type=\"button\" sc-camel-on-click=\"{{downloadDoc}}\" style=\"display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#15293f;background:#fff;border:1px solid #e0d8c9;border-radius:8px;padding:9px 13px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#f7f4ee;\"><span aria-hidden=\"true\" style=\"display:inline-flex;\">{{docIconSm}}<\u002Fspan> Download as document<\u002Fbutton>\n             <button type=\"button\" sc-camel-on-click=\"{{downloadXls}}\" style=\"display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#15293f;background:#fff;border:1px solid #e0d8c9;border-radius:8px;padding:9px 13px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#f7f4ee;\"><span aria-hidden=\"true\" style=\"display:inline-flex;\">{{gridIconSm}}<\u002Fspan> Download as Excel<\u002Fbutton>\n           <\u002Fdiv>\n           <div style=\"font-size:11px;color:#a3a9b1;margin-top:7px;\">Includes the current perspective, the figures and the recommendation.<\u002Fdiv>\n         <\u002Fdiv>\n       <\u002Fsc-if>\n       <sc-if value=\"{{d.hasChips}}\" hint-placeholder-val=\"{{false}}\">\n         <div style=\"margin-top:16px;\">\n           <div style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;margin-bottom:9px;\">Dig deeper<\u002Fdiv>\n           <div style=\"display:flex;flex-wrap:wrap;gap:8px;\">\n             <sc-for list=\"{{d.chips}}\" as=\"ch\" hint-placeholder-count=\"2\">\n               <button type=\"button\" sc-camel-on-click=\"{{onChip}}\" data-q=\"{{ch.q}}\" style=\"font-size:13px;font-weight:600;color:#2f6b4f;background:#eaf1ed;border:none;border-radius:999px;padding:9px 14px;cursor:pointer;font-family:inherit;\" style-hover=\"filter:brightness(.98);\">{{ch.label}}<\u002Fbutton>\n             <\u002Fsc-for>\n           <\u002Fdiv>\n         <\u002Fdiv>\n       <\u002Fsc-if>\n\n       <!-- perspectives: collapsed accordion, the secondary layer below the answer -->\n       <sc-if value=\"{{d.hasPerspList}}\" hint-placeholder-val=\"{{false}}\">\n         <div style=\"margin-top:20px;padding-top:16px;border-top:1px solid #f1ede4;\">\n           <div style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;margin-bottom:9px;\">See this from another seat<\u002Fdiv>\n           <div style=\"display:flex;flex-direction:column;gap:7px;\">\n             <sc-for list=\"{{d.perspList}}\" as=\"pv\" hint-placeholder-count=\"5\">\n               <details style=\"border:1px solid #e6e0d4;border-radius:9px;overflow:hidden;\">\n                 <summary style=\"list-style:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 14px;\">\n                   <span style=\"font-size:13px;font-weight:600;color:#15293f;\">{{pv.role}}<\u002Fspan>\n                   <span aria-hidden=\"true\" style=\"display:inline-flex;color:#c2b7a3;font-size:10px;\">▾<\u002Fspan>\n                 <\u002Fsummary>\n
