ackground:#eef1f5;border:1px solid #d6deea;border-radius:5px;padding:4px 8px;\">ML · machine learning<\u002Fspan>\n       <\u002Fdiv>\n       <div style=\"margin-top:14px;border:1px solid #f1ece1;border-radius:10px;overflow:hidden;\">\n         <div style=\"display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:8px;padding:10px 14px;background:#faf8f3;border-bottom:1px solid #f1ece1;\">\n           <span style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;\">Item<\u002Fspan>\n           <span style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;text-align:right;\">Current<\u002Fspan>\n           <span style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;text-align:right;\">Proposed<\u002Fspan>\n           <span style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;text-align:right;\">Weekly · annual<\u002Fspan>\n         <\u002Fdiv>\n         <sc-for list=\"{{fixRows}}\" as=\"r\" hint-placeholder-count=\"2\">\n           <div style=\"display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:8px;padding:12px 14px;border-bottom:1px solid #f3efe6;border-left:3px solid {{r.accent}};align-items:center;\">\n             <span style=\"font-size:13.5px;font-weight:600;color:#15293f;\">{{r.item}}<\u002Fspan>\n             <span style=\"font-size:13px;color:#a3a9b1;text-align:right;text-decoration:line-through;\">{{r.current}}<\u002Fspan>\n             <span class=\"cs\" style=\"font-size:13.5px;font-weight:700;color:#15293f;text-align:right;\">{{r.proposed}}<\u002Fspan>\n             <span style=\"font-size:12.5px;color:#2f6b4f;text-align:right;\">{{r.weekly}} · {{r.annual}}<\u002Fspan>\n           <\u002Fdiv>\n         <\u002Fsc-for>\n         <div style=\"display:grid;grid-template-columns:1.4fr 2fr 1fr;gap:8px;padding:12px 14px;border-bottom:1px solid #f3efe6;align-items:center;\">\n           <span style=\"font-size:13px;color:#8a94a0;\">All other lines<\u002Fspan>\n           <span style=\"font-size:13px;color:#8a94a0;\">unchanged<\u002Fspan>\n           <span><\u002Fspan>\n         <\u002Fdiv>\n         <div style=\"display:grid;grid-template-columns:1.4fr 2fr 1fr;gap:8px;padding:13px 14px;background:#f4f8f5;border-left:3px solid #2f6b4f;align-items:center;\">\n           <span style=\"font-size:13px;font-weight:700;color:#15293f;\">Total saving<\u002Fspan>\n           <span><\u002Fspan>\n           <span class=\"cs\" style=\"font-size:14px;font-weight:700;color:#2f6b4f;text-align:right;\">$62.30/wk<\u002Fspan>\n         <\u002Fdiv>\n       <\u002Fdiv>\n     <\u002Fdiv>\n     <div style=\"margin-top:14px;border-left:3px solid #bf8a2e;background:#fcf6ea;border-radius:0 10px 10px 0;padding:14px 17px;\">\n       <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#b6831f;\">Manager flag · Outlet 117<\u002Fdiv>\n       <div style=\"font-size:13.5px;color:#3c4a5a;line-height:1.55;margin-top:6px;\">Cheese over-portioning detected. Likely prep or plating station. Recommend a portion check before Friday service. System cannot confirm which station without direct observation.<\u002Fdiv>\n     <\u002Fdiv>\n     <sc-if value=\"{{pathway.notPlaced}}\" hint-placeholder-val=\"{{true}}\">\n       <div style=\"margin-top:16px;border:1px solid #d6e6dc;background:#f4f8f5;border-radius:11px;padding:17px 19px;\">\n         <div style=\"font-size:13.5px;color:#2c4a39;line-height:1.55;\">Review the proposed quantities. Confirm to send to your supplier. The system does not order automatically, nothing has been placed yet.<\u002Fdiv>\n         <button type=\"button\" sc-camel-on-click=\"{{openPlaceModal}}\" style=\"margin-top:13px;width:100%;display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:9px;background:#15293f;color:#fff;font-size:14.5px;font-weight:600;padding:13px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">{{checkIconWhite}} Confirm and place order<\u002Fbutton>\n         <div style=\"font-size:12px;color:#8a94a0;text-align:center;margin-top:9px;\">Nothing acts without your tap. You are confirming this proposal.<\u002Fdiv>\n       <\u002Fdiv>\n     <\u002Fsc-if>\n     <sc-if value=\"{{pathway.placed}}\" hint-placeholder-val=\"{{false}}\">\n       <div style=\"font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#a3a9b1;margin-top:26px;\">Financial impact · this outlet · trailing 12 weeks<\u002Fdiv>\n       <div style=\"display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;\">\n         <sc-for list=\"{{impactCards}}\" as=\"c\" hint-placeholder-count=\"4\">\n           <div style=\"flex:1;min-width:120px;border:1px solid #e6e0d4;border-radius:10px;padding:13px 14px;text-align:center;\">\n             <div class=\"cs\" style=\"font-size:18px;font-weight:700;color:{{c.color}};\">{{c.arrow}} {{c.v}}<\u002Fdiv>\n             <div style=\"font-size:11.5px;color:#6f7d8c;margin-top:5px;line-height:1.35;\">{{c.label}}<\u002Fdiv>\n           <\u002Fdiv>\n         <\u002Fsc-for>\n       <\u002Fdiv>\n       <div style=\"margin-top:16px;background:#15293f;border-radius:13px;padding:22px 24px;\">\n         <div class=\"cs\" style=\"font-size:34px;font-weight:700;color:#fff;line-height:1;\">$3,240<\u002Fdiv>\n         <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px;\">\n           <span style=\"font-size:12.5px;color:#9fb0c6;\">Annualised operating cash flow improvement · Outlet 117 · food cost channel only<\u002Fspan>\n           <span style=\"font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#e6b566;border:1px solid #7a6636;border-radius:4px;padding:2px 6px;\">Directional<\u002Fspan>\n         <\u002Fdiv>\n         <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;\">\n           <div style=\"background:#1d324a;border-radius:9px;padding:13px 15px;\">\n             <div class=\"cs\" style=\"font-size:18px;font-weight:700;color:#fff;\">$648k<\u002Fdiv>\n             <div style=\"font-size:11.5px;color:#9fb0c6;margin-top:4px;line-height:1.4;\">Annualised across 200 outlets at this saving rate<\u002Fdiv>\n           <\u002Fdiv>\n           <div style=\"background:#1d324a;border-radius:9px;padding:13px 15px;\">\n             <div class=\"cs\" style=\"font-size:18px;font-weight:700;color:#fff;\">↓ 18%<\u002Fdiv>\n             <div style=\"font-size:11.5px;color:#9fb0c6;margin-top:4px;line-height:1.4;\">Waste reduction, product not bought is product not written off<\u002Fdiv>\n           <\u002Fdiv>\n           <div style=\"background:#1d324a;border-radius:9px;padding:13px 15px;\">\n             <div class=\"cs\" style=\"font-size:18px;font-weight:700;color:#fff;\">97% fill<\u002Fdiv>\n             <div style=\"font-size:11.5px;color:#9fb0c6;margin-top:4px;line-height:1.4;\">Supplier fill rate on right-sized orders vs 91% on over-orders<\u002Fdiv>\n           <\u002Fdiv>\n           <div style=\"background:#1d324a;border-radius:9px;padding:13px 15px;\">\n             <div class=\"cs\" style=\"font-size:18px;font-weight:700;color:#fff;\">1 platform<\u002Fdiv>\n             <div style=\"font-size:11.5px;color:#9fb0c6;margin-top:4px;line-height:1.4;\">Ordering, food cost, waste and supplier data reconciled natively, no integration required<\u002Fdiv>\n           <\u002Fdiv>\n         <\u002Fdiv>\n       <\u002Fdiv>\n       <div style=\"margin-top:14px;border:1px solid #ece7dc;background:#fbfaf6;border-radius:10px;padding:14px 16px;\">\n         <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;\">What this is and what it is not<\u002Fdiv>\n         <div style=\"font-size:12.5px;color:#6f7d8c;line-height:1.55;margin-top:6px;\">The food cost channel saving is analytically derived from the ordering trim on the platform’s own recipe and count data. Waste reduction and supplier fill rate are operational consequences of right-sizing orders, grounded in the platform’s purchase history. These are directional estimates for a representative outlet. The ROI dashboard, in development, will produce measured figures per customer over time.<\u002Fdiv>\n       <\u002Fdiv>\n     <\u002Fsc-if>\n   <\u002Fsc-if>\n\n   <!-- ===== ORDERING BEAT 4: VALIDATED SAVING (reuses placed impact) ===== -->\n   <sc-if value=\"{{pathway.po4}}\" hint-placeholder-val=\"{{false}}\">\n     <div style=\"margin-top:22px;display:flex;gap:10px;flex-wrap:wrap;\">\n       <sc-for list=\"{{impactCards}}\" as=\"c\" hint-placeholder-count=\"4\">\n         <div style=\"flex:1;min-width:120px;border:1px solid #e6e0d4;border-radius:10px;padding:15px 14px;text-align:center;\">\n           <div class=\"cs\" style=\"font-size:20px;font-weight:700;color:{{c.color}};\">{{c.arrow}} {{c.v}}<\u002Fdiv>\n           <div style=\"font-size:11.5px;color:#6f7d8c;margin-top:6px;line-height:1.35;\">{{c.label}}<\u002Fdiv>\n         <\u002Fdiv>\n       <\u002Fsc-for>\n     <\u002Fdiv>\n     <div style=\"margin-top:16px;background:#15293f;border-radius:13px;padding:24px;\">\n       <div class=\"cs\" style=\"font-size:40px;font-weight:700;color:#fff;line-height:1;\">$3,240<\u002Fdiv>\n       <div style=\"font-size:13px;color:#9fb0c6;margin-top:9px;line-height:1.5;max-width:520px;\">Annualised operating cash flow improvement at this outlet on the food cost channel alone. Across 200 outlets at the same rate, about $648k. The same recipe and count data closes waste and lifts supplier fill at the same time, on one platform, with no integration.<\u002Fdiv>\n     <\u002Fdiv>\n   <\u002Fsc-if>\n\n   <!-- ===== SCHEDULING BEAT 1: COPIED ===== -->\n   <sc-if value=\"{{pathway.ps1}}\" hint-placeholder-val=\"{{false}}\">\n     <div style=\"margin-top:22px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;\">\n       <div style=\"display:flex;align-items:center;gap:12px;border-left:3px solid #bf8a2e;background:#fcf6ea;border-radius:0 9px 9px 0;padding:11px 16px;\">\n         <span class=\"cs\" style=\"font-size:24px;font-weight:700;color:#b6831f;\">94%<\u002Fspan>\n         <div>\n           <div style=\"font-size:12.5px;color:#3c4a5a;\">Identical to last week<\u002Fdiv>\n           <div style=\"font-size:12.5px;color:#b6831f;font-weight:600;\">3 conflicts unchecked<\u002Fdiv>\n         <\u002Fdiv>\n       <\u002Fdiv>\n       <span style=\"font-size:12px;color:#a3a9b1;\">Week of 30 Jun · Outlet 117<\u002Fspan>\n     <\u002Fdiv>\n     <div style=\"margin-top:14px;\">{{rosterEl}}<\u002Fdiv>\n     <div style=\"margin-top:14px;border-left:3px solid #bf8a2e;background:#fcf6ea;border-radius:0 10px 10px 0;padding:14px 17px;\">\n       <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#b6831f;\">3 conflicts found before the schedule was sent<\u002Fdiv>\n       <div style=\"font-size:13.5px;color:#3c4a5a;line-height:1.55;margin-top:6px;\">If this goes out as copied: two Friday evening shifts uncovered, Saturday overtime posts to payroll at 1.5x. Estimated unplanned cost: $280. The platform found all three conflicts on Monday, when the fix costs nothing.<\u002Fdiv>\n     <\u002Fdiv>\n     <button type=\"button\" sc-camel-on-click=\"{{pathNext}}\" style=\"margin-top:16px;width:100%;display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:9px;background:#15293f;color:#fff;font-size:14.5px;font-weight:600;padding:13px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">{{layersIcon}} Build from forecast<\u002Fbutton>\n     <div style=\"font-size:12px;color:#8a94a0;text-align:center;margin-top:9px;\">The same ML demand forecast that drives your ingredient order drives your staffing schedule. One tap. Confirm before publishing.<\u002Fdiv>\n   <\u002Fsc-if>\n\n   <!-- ===== SCHEDULING BEAT 2: FORECAST-DRIVEN ===== -->\n   <sc-if value=\"{{pathway.ps2}}\" hint-placeholder-val=\"{{false}}\">\n     <div style=\"margin-top:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;\">\n       <span style=\"font-size:12.5px;color:#2f6b4f;font-weight:600;\">3 conflicts resolved · 1 gap filled · proposal only, confirm before publishing<\u002Fspan>\n       <span style=\"font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#bf8a2e;border:1px solid #ecdcb8;border-radius:4px;padding:2px 7px;\">AI scheduling · roadmap<\u002Fspan>\n     <\u002Fdiv>\n     <div style=\"margin-top:14px;\">{{rosterFixEl}}<\u002Fdiv>\n     <div style=\"margin-top:14px;background:#faf8f3;border:1px solid #eee9dd;border-radius:10px;padding:13px 16px;\">\n       <span style=\"font-size:12.5px;color:#3c4a5a;\">3 conflicts resolved · 1 gap filled · <strong style=\"color:#2f6b4f;\">↓ 1.8 pts<\u002Fstrong> projected labour vs last week · <strong style=\"color:#15293f;\">$0<\u002Fstrong> unplanned overtime vs $280 last week<\u002Fspan>\n     <\u002Fdiv>\n     <div style=\"margin-top:14px;border:1px solid #d6e6dc;background:#f4f8f5;border-radius:11px;padding:17px 19px;\">\n       <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#2f6b4f;\">This is a proposal<\u002Fdiv>\n       <div style=\"font-size:13.5px;color:#2c4a39;line-height:1.55;margin-top:6px;\">Built from the ML demand forecast and your labour matrix. No shift has been published. Confirm to send to staff, or make changes first.<\u002Fdiv>\n       <div style=\"display:flex;gap:10px;margin-top:13px;flex-wrap:wrap;\">\n         <sc-if value=\"{{pathway.schedIdle}}\" hint-placeholder-val=\"{{true}}\">\n           <button type=\"button\" sc-camel-on-click=\"{{confirmSched}}\" style=\"flex:1;min-width:160px;display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:9px;background:#15293f;color:#fff;font-size:14px;font-weight:600;padding:12px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">{{checkIconWhite}} Confirm schedule<\u002Fbutton>\n           <button type=\"button\" style=\"flex:none;border:1px solid #cdc4b2;background:#fff;border-radius:9px;color:#6f7d8c;font-size:14px;font-weight:600;padding:12px 18px;cursor:pointer;font-family:inherit;\">Make changes<\u002Fbutton>\n         <\u002Fsc-if>\n         <sc-if value=\"{{pathway.schedConfirmed}}\" hint-placeholder-val=\"{{false}}\">\n           <span style=\"display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#2f6b4f;\">{{checkIcon}} Schedule confirmed and sent to staff<\u002Fspan>\n         <\u002Fsc-if>\n       <\u002Fdiv>\n       <div style=\"font-size:12px;color:#8a94a0;margin-top:10px;\">Nothing publishes without your confirmation. The system does not act autonomously.<\u002Fdiv>\n     <\u002Fdiv>\n   <\u002Fsc-if>\n\n   <!-- ===== SCHEDULING BEAT 3: INTRA-SHIFT ===== -->\n   <sc-if value=\"{{pathway.ps3}}\" hint-placeholder-val=\"{{false}}\">\n     <div style=\"margin-top:22px;display:grid;grid-template-columns:1fr 1fr;gap:14px;\">\n       <div style=\"border:1px solid #e6e0d4;background:#fff;border-radius:12px;padding:17px;\">\n         <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;\">Labour cost · right now<\u002Fdiv>\n         <div class=\"cs\" style=\"font-size:32px;font-weight:700;color:#b23a2e;margin-top:8px;line-height:1;\">↑ 31%<\u002Fdiv>\n         <div style=\"font-size:12px;color:#8a94a0;margin-top:5px;\">Target 28%<\u002Fdiv>\n         <div style=\"margin-top:12px;height:30px;background:#fdf3f2;border-radius:7px;position:relative;overflow:hidden;\">\n           <div style=\"position:absolute;left:0;top:0;bottom:0;width:90%;background:rgba(178,58,46,.16);\"><\u002Fdiv>\n           <div style=\"position:absolute;left:80%;top:0;bottom:0;border-left:1.5px dashed #b6831f;\"><\u002Fdiv>\n           <span style=\"position:absolute;left:9px;top:7px;font-size:12px;font-weight:700;color:#b23a2e;\">31%<\u002Fspan>\n           <span style=\"position:absolute;right:9px;top:8px;font-size:11px;color:#2f6b4f;\">↓ closing<\u002Fspan>\n         <\u002Fdiv>\n         <div style=\"margin-top:12px;background:#f4f8f5;border:1px solid #e0ebe3;border-radius:8px;padding:11px 13px;font-size:12.5px;color:#3c4a5a;line-height:1.5;font-style:italic;\">Forecast shows demand picks up at 1:30pm. Labour will drop to about 27% without any change. No action needed unless it stays above 30% at 2pm.<\u002Fdiv>\n       <\u002Fdiv>\n       <div style=\"border:1px solid #e6e0d4;background:#fff;border-radius:12px;padding:17px;\">\n         <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;\">Overtime risk<\u002Fdiv>\n         <div style=\"margin-top:10px;border-left:3px solid #bf8a2e;background:#fcf6ea;border-radius:0 8px 8px 0;padding:12px 14px;\">\n           <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#b6831f;\">Overtime flag · 1 employee<\u002Fdiv>\n           <div style=\"font-size:13.5px;font-weight:600;color:#15293f;margin-top:6px;\">Employee 4<\u002Fdiv>\n           <div style=\"font-size:12.5px;color:#3c4a5a;line-height:1.5;margin-top:4px;\">Hour 7 of 7-hour shift. Stays beyond 7:30pm triggers overtime at 1.5x. Contracted hours met at shift end.<\u002Fdiv>\n           <div style=\"display:flex;align-items:center;gap:7px;margin-top:9px;flex-wrap:wrap;\"><span style=\"font-size:12.5px;color:#3c4a5a;\">Estimated cost if extended:<\u002Fspan><span style=\"font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#bf8a2e;border:1px solid #ecdcb8;border-radius:4px;padding:2px 6px;\">Illustrative<\u002Fspan><\u002Fdiv>\n           <div style=\"margin-top:12px;\">\n             <sc-if value=\"{{pathway.otOpen}}\" hint-placeholder-val=\"{{true}}\">\n               <div style=\"display:flex;gap:8px;flex-wrap:wrap;\">\n                 <button type=\"button\" sc-camel-on-click=\"{{toggleOt}}\" style=\"border:none;border-radius:8px;background:#bf8a2e;color:#fff;font-size:12.5px;font-weight:600;padding:9px 14px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#a97a26;\">Flag for approval<\u002Fbutton>\n                 <button type=\"button\" sc-camel-on-click=\"{{toggleOt}}\" style=\"border:1px solid #cdc4b2;background:#fff;border-radius:8px;color:#6f7d8c;font-size:12.5px;font-weight:600;padding:9px 14px;cursor:pointer;font-family:inherit;\">Dismiss<\u002Fbutton>\n               <\u002Fdiv>\n             <\u002Fsc-if>\n             <sc-if value=\"{{pathway.otFlagged}}\" hint-placeholder-val=\"{{false}}\">\n               <span style=\"display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:#2f6b4f;\">{{checkIcon}} Sent to manager for approval<\u002Fspan>\n             <\u002Fsc-if>\n           <\u002Fdiv>\n         <\u002Fdiv>\n       <\u002Fdiv>\n     <\u002Fdiv>\n     <div style=\"margin-top:14px;border:1px solid #ece7dc;background:#fbfaf6;border-radius:10px;padding:14px 16px;\">\n       <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;\">Why this view matters<\u002Fdiv>\n       <div style=\"font-size:13px;color:#6f7d8c;line-height:1.55;margin-top:6px;\">The difference between finding out on Friday that Tuesday ran at 38% labour and finding out on Tuesday at 1pm is the difference between a report and a management tool. Clock-in data is reconciled from the till in real time against the scheduled shift.<\u002Fdiv>\n     <\u002Fdiv>\n   <\u002Fsc-if>\n\n   <!-- ===== SCHEDULING BEAT 4: SAVING ===== -->\n   <sc-if value=\"{{pathway.ps4}}\" hint-placeholder-val=\"{{false}}\">\n     <div style=\"margin-top:22px;display:flex;gap:10px;flex-wrap:wrap;\">\n       <div style=\"flex:1;min-width:150px;border:1px solid #e6e0d4;border-radius:11px;padding:17px;text-align:center;\">\n         <div class=\"cs\" style=\"font-size:22px;font-weight:700;color:#2f6b4f;\">↓ 1.8 pts<\u002Fdiv>\n         <div style=\"font-size:12px;color:#6f7d8c;margin-top:6px;\">Labour cost vs last week’s actual<\u002Fdiv>\n       <\u002Fdiv>\n       <div style=\"flex:1;min-width:150px;border:1px solid #e6e0d4;border-radius:11px;padding:17px;text-align:center;\">\n         <div class=\"cs\" style=\"font-size:22px;font-weight:700;color:#15293f;\">$0<\u002Fdiv>\n         <div style=\"font-size:12px;color:#6f7d8c;margin-top:6px;\">Unplanned overtime vs $280 last week<\u002Fdiv>\n       <\u002Fdiv>\n       <div style=\"flex:1;min-width:150px;border:1px solid #e6e0d4;border-radius:11px;padding:17px;text-align:center;\">\n         <div class=\"cs\" style=\"font-size:22px;font-weight:700;color:#2f6b4f;\">3 vs 0<\u002Fdiv>\n         <div style=\"font-size:12px;color:#6f7d8c;margin-top:6px;\">Conflicts caught before the shift<\u002Fdiv>\n       <\u002Fdiv>\n     <\u002Fdiv>\n     <div style=\"font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#a3a9b1;margin-top:22px;\">Combined prime cost impact · this week<\u002Fdiv>\n     <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px;\">\n       <div style=\"border:1px solid #e6e0d4;background:#fff;border-radius:11px;padding:16px;\">\n         <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;\">Food cost · ordering<\u002Fdiv>\n         <div class=\"cs\" style=\"font-size:24px;font-weight:700;color:#2f6b4f;margin-top:7px;\">↓ 2.1 pts<\u002Fdiv>\n         <div style=\"font-size:12px;color:#8a94a0;margin-top:5px;\">From 29.6% toward 27.5% target<\u002Fdiv>\n         <div style=\"font-size:12.5px;color:#3c4a5a;line-height:1.5;margin-top:9px;\">Order trim on cheese and mince. Annualised saving at this outlet: $3,240. Across 200 outlets: $648k.<\u002Fdiv>\n       <\u002Fdiv>\n       <div style=\"border:1px solid #e6e0d4;background:#fff;border-radius:11px;padding:16px;\">\n         <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;\">Labour cost · scheduling<\u002Fdiv>\n         <div class=\"cs\" style=\"font-size:24px;font-weight:700;color:#2f6b4f;margin-top:7px;\">↓ 1.8 pts<\u002Fdiv>\n         <div style=\"font-size:12px;color:#8a94a0;margin-top:5px;\">Projected from 29.3% toward 27.5% target<\u002Fdiv>\n         <div style=\"font-size:12.5px;color:#3c4a5a;line-height:1.5;margin-top:9px;\">Forecast-built schedule eliminates unplanned overtime and covers gaps. Annualised labour saving at this outlet: about $2,100.<\u002Fdiv>\n       <\u002Fdiv>\n     <\u002Fdiv>\n     <div style=\"margin-top:14px;border:1px solid #cfe1d6;background:#eef5f0;border-radius:11px;padding:16px 18px;\">\n       <div class=\"cs\" style=\"font-size:19px;font-weight:700;color:#2f6b4f;\">↓ 3.9 pts · combined prime cost improvement<\u002Fdiv>\n       <div style=\"font-size:13px;color:#3c4a5a;line-height:1.6;margin-top:8px;\">The same ML demand forecast closed both gaps, it built the right inventory order and the right staff schedule. One data source, two prime costs, one platform. No POS system, no payroll platform, and no standalone rostering tool holds all four inputs needed to do this: the demand forecast, the labour matrix, the stock count, and the recipe database.<\u002Fdiv>\n     <\u002Fdiv>\n     <div style=\"margin-top:14px;border:1px solid #ece7dc;background:#fbfaf6;border-radius:10px;padding:14px 16px;\">\n       <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;\">Annual prize across the estate<\u002Fdiv>\n       <div style=\"font-size:12.5px;color:#6f7d8c;line-height:1.55;margin-top:6px;\">At a $20k a week outlet, one percentage point of unnecessary labour is $10,400 a year. Across 200 outlets, 3.9 combined prime cost points recovered is worth about $8M a year in margin. The platform can measure and evidence this today, outlet by outlet.<\u002Fdiv>\n       <div style=\"display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap;\"><span style=\"font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#bf8a2e;border:1px solid #ecdcb8;border-radius:4px;padding:2px 7px;\">Directional<\u002Fspan><span style=\"font-size:12px;color:#8a94a0;\">ROI dashboard, in development, will surface measured figures per customer.<\u002Fspan><\u002Fdiv>\n     <\u002Fdiv>\n     <div style=\"margin-top:14px;border:1px solid #ece7dc;background:#fbfaf6;border-radius:10px;padding:14px 16px;\">\n       <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;\">What is live today and what is roadmap<\u002Fdiv>\n       <div style=\"font-size:12.5px;color:#6f7d8c;line-height:1.55;margin-top:6px;\">Schedule management, employee availability, overtime rules, and clock-in reconciliation are live. AI scheduling, mapping the demand forecast to the labour matrix and slotting employees automatically, is a 2026 roadmap goal confirmed by the CTO. This demo shows what it looks like, not that it is in production.<\u002Fdiv>\n       <div style=\"display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap;\"><span style=\"font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#bf8a2e;border:1px solid #ecdcb8;border-radius:4px;padding:2px 7px;\">AI scheduling · roadmap<\u002Fspan><\u002Fdiv>\n     <\u002Fdiv>\n   <\u002Fsc-if>\n\n   <!-- bottom nav -->\n   <div style=\"display:flex;gap:12px;margin-top:26px;\">\n     <button type=\"button\" sc-camel-on-click=\"{{pathBack}}\" style=\"flex:none;border:1px solid #e0d8c9;background:#fff;border-radius:9px;color:#6f7d8c;font-size:14px;font-weight:600;padding:13px 18px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#f7f4ee;\">← Back<\u002Fbutton>\n     <sc-if value=\"{{pathway.hasNext}}\" hint-placeholder-val=\"{{true}}\">\n       <button type=\"button\" sc-camel-on-click=\"{{pathNext}}\" style=\"flex:1;border:none;border-radius:9px;background:#15293f;color:#fff;font-size:14.5px;font-weight:600;padding:13px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">{{pathway.nextLabel}} →<\u002Fbutton>\n     <\u002Fsc-if>\n     <sc-if value=\"{{pathway.noNext}}\" hint-placeholder-val=\"{{false}}\">\n       <button type=\"button\" sc-camel-on-click=\"{{pathExit}}\" style=\"flex:1;border:none;border-radius:9px;background:#15293f;color:#fff;font-size:14.5px;font-weight:600;padding:13px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">Back to the front door<\u002Fbutton>\n     <\u002Fsc-if>\n   <\u002Fdiv>\n\n   <!-- confirm order modal -->\n   <sc-if value=\"{{pathway.modal}}\" hint-placeholder-val=\"{{false}}\">\n     <div style=\"position:fixed;inset:0;background:rgba(21,41,63,.45);z-index:60;display:flex;align-items:center;justify-content:center;padding:24px;\" sc-camel-on-click=\"{{closePlaceModal}}\">\n       <div style=\"background:#fff;border-radius:14px;padding:24px;max-width:420px;width:100%;box-shadow:0 24px 60px rgba(21,41,63,.3);\">\n         <div aria-hidden=\"true\" style=\"display:inline-flex;width:40px;height:40px;align-items:center;justify-content:center;border-radius:50%;background:#eef5f0;color:#2f6b4f;\">{{checkIcon}}<\u002Fdiv>\n         <div class=\"cs\" style=\"font-size:21px;font-weight:700;color:#15293f;margin-top:14px;\">Confirm trimmed order?<\u002Fdiv>\n         <div style=\"font-size:13.5px;color:#3c4a5a;line-height:1.55;margin-top:9px;\">Based on today’s count and the ML demand forecast. Confirming sends adjusted quantities to your supplier. The system does not order automatically, nothing has been placed yet.<\u002Fdiv>\n         <div style=\"display:flex;gap:10px;margin-top:18px;\">\n           <button type=\"button\" sc-camel-on-click=\"{{closePlaceModal}}\" style=\"flex:none;border:1px solid #cdc4b2;background:#fff;border-radius:9px;color:#6f7d8c;font-size:14px;font-weight:600;padding:11px 18px;cursor:pointer;font-family:inherit;\">Review again<\u002Fbutton>\n           <button type=\"button\" sc-camel-on-click=\"{{placeOrder}}\" style=\"flex:1;display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:9px;background:#15293f;color:#fff;font-size:14px;font-weight:600;padding:11px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">{{checkIconWhite}} Place order<\u002Fbutton>\n         <\u002Fdiv>\n       <\u002Fdiv>\n     <\u002Fdiv>\n   <\u002Fsc-if>\n <\u002Fdiv>\n <\u002Fsc-if>\n\n <!-- ===================== THE FULL PICTURE ===================== -->\n <sc-if value=\"{{isFull}}\" hint-placeholder-val=\"{{false}}\">\n <div style=\"max-width:1180px;margin:0 auto;padding:18px 30px 56px;\">\n  <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;\">\n    <button type=\"button\" sc-camel-on-click=\"{{setView}}\" data-view=\"door\" style=\"border:1px solid #e0d8c9;background:#fff;border-radius:9px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:#6f7d8c;padding:8px 13px;\" style-hover=\"background:#f7f4ee;\">← Back to the front door<\u002Fbutton>\n    <button type=\"button\" sc-camel-on-click=\"{{goDepth}}\" style=\"border:1px solid #e0d8c9;background:#fff;border-radius:9px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:#6f7d8c;padding:8px 13px;\" style-hover=\"background:#f7f4ee;\">Platform depth →<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- ===================== HEADER ===================== -->\n  <header style=\"padding-bottom:16px;border-bottom:1px solid #e0d8c9;\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:18px;flex-wrap:wrap;\">\n      <div style=\"min-width:0;\">\n        <div style=\"font-size:11.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#a3956f;\">Planning cockpit · {{periodLabel}}<\u002Fdiv>\n        <div class=\"cs\" style=\"font-size:24px;font-weight:700;color:#15293f;margin-top:4px;\">{{scope}}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap;\">\n        <div role=\"group\" aria-label=\"View as\" style=\"display:flex;background:#fff;border:1px solid #e0d8c9;border-radius:9px;padding:3px;\">\n          <sc-for list=\"{{roleTabs}}\" as=\"r\" hint-placeholder-count=\"3\">\n            <button type=\"button\" sc-camel-on-click=\"{{setRole}}\" data-role=\"{{r.key}}\" aria-pressed=\"{{r.on}}\" style=\"border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;padding:7px 13px;border-radius:7px;background:{{r.bg}};color:{{r.color}};\">{{r.label}}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div role=\"group\" aria-label=\"Horizon\" style=\"display:flex;background:#f1ece1;border-radius:9px;padding:3px;\">\n          <sc-for list=\"{{horizonTabs}}\" as=\"h\" hint-placeholder-count=\"2\">\n            <button type=\"button\" sc-camel-on-click=\"{{setHorizon}}\" data-h=\"{{h.key}}\" aria-pressed=\"{{h.on}}\" style=\"border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;padding:7px 13px;border-radius:7px;background:{{h.bg}};color:{{h.color}};\">{{h.label}}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- SEARCH -->\n    <form sc-camel-on-submit=\"{{onSubmit}}\" style=\"margin-top:16px;position:relative;\">\n      <span aria-hidden=\"true\" style=\"position:absolute;left:15px;top:50%;transform:translateY(-50%);color:#a3a9b1;display:inline-flex;\">{{searchIcon}}<\u002Fspan>\n      <sc-if value=\"{{showAskRotate}}\" hint-placeholder-val=\"{{true}}\">\n        <div aria-hidden=\"true\" style=\"position:absolute;left:44px;top:50%;transform:translateY(-50%);font-size:15px;color:#a3a9b1;pointer-events:none;white-space:nowrap;overflow:hidden;\">Ask for {{askWordEl}}<\u002Fdiv>\n      <\u002Fsc-if>\n      <input type=\"text\" value=\"{{searchValue}}\" sc-camel-on-input=\"{{onType}}\" sc-camel-on-focus=\"{{onSearchFocus}}\" sc-camel-on-blur=\"{{onSearchBlur}}\" placeholder=\"{{searchPlaceholder}}\" aria-label=\"Ask the planning agents a question\" readonly=\"{{searchReadonly}}\" style=\"width:100%;height:50px;border:1px solid {{searchBorder}};border-radius:10px;padding:0 56px 0 44px;font-size:15px;color:#15293f;font-family:inherit;background:#fff;\" style-focus=\"border-color:#2f6b4f;box-shadow:0 0 0 3px rgba(47,107,79,.12);\">\n      <button type=\"button\" sc-camel-on-click=\"{{toggleVoice}}\" aria-pressed=\"{{voiceAria}}\" aria-label=\"{{voiceLabel}}\" style=\"position:absolute;right:8px;top:50%;transform:translateY(-50%);width:38px;height:38px;border-radius:9px;border:none;cursor:pointer;background:{{voiceBg}};color:{{voiceColor}};display:inline-flex;align-items:center;justify-content:center;font-family:inherit;\">\n        <sc-if value=\"{{voiceListening}}\" hint-placeholder-val=\"{{false}}\">\n          <span aria-hidden=\"true\" style=\"position:relative;display:inline-flex;align-items:center;justify-content:center;\">\n            <span style=\"position:absolute;width:34px;height:34px;border-radius:50%;background:#2f6b4f;opacity:.35;animation:soPulse 1.4s ease-out infinite;\"><\u002Fspan>\n            <span style=\"position:relative;display:inline-flex;\">{{micIconGreen}}<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fsc-if>\n        <sc-if value=\"{{voiceIdleState}}\" hint-placeholder-val=\"{{true}}\">\n          <span aria-hidden=\"true\">{{micIconGrey}}<\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fbutton>\n      <sc-if value=\"{{showSuggest}}\" hint-placeholder-val=\"{{false}}\">\n        <div style=\"position:absolute;left:0;right:0;top:58px;z-index:40;background:#fff;border:1px solid #e6e0d4;border-radius:13px;box-shadow:0 18px 44px rgba(21,41,63,.16);padding:7px;overflow:hidden;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 12px 8px;\">\n            <span style=\"font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#a3a9b1;\">{{suggestHeader}}<\u002Fspan>\n            <span style=\"font-size:10.5px;color:#c2b7a3;\">Enter to ask<\u002Fspan>\n          <\u002Fdiv>\n          <sc-for list=\"{{suggestRows}}\" as=\"sg\" hint-placeholder-count=\"4\">\n            <button type=\"button\" sc-camel-on-mouse-down=\"{{pickSuggest}}\" data-q=\"{{sg.q}}\" style=\"width:100%;text-align:left;background:none;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:9px;\" style-hover=\"background:#f6f4ee;\">\n              <span aria-hidden=\"true\" style=\"flex:none;width:8px;height:8px;border-radius:50%;background:{{sg.dot}};\"><\u002Fspan>\n              <span style=\"flex:1;font-size:14.5px;color:#15293f;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{sg.label}}<\u002Fspan>\n              <span style=\"flex:none;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:{{sg.dot}};background:#faf8f3;border-radius:5px;padding:3px 7px;\">{{sg.cat}}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n          <div style=\"padding:8px 12px 5px;margin-top:3px;border-top:1px solid #f3efe6;font-size:11px;color:#a3a9b1;\">Every answer comes with a chart, the analysis and Finance, Ops, Sales, Procurement and QA views.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fform>\n    <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin-top:10px;\">\n      <button type=\"button\" sc-camel-on-click=\"{{askSample}}\" style=\"display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:#fff;background:#15293f;border:none;border-radius:999px;padding:8px 14px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">\n        <span aria-hidden=\"true\" style=\"display:inline-flex;\">{{sparkIconSm}}<\u002Fspan> Try a sample question\n      <\u002Fbutton>\n      <sc-for list=\"{{suggests}}\" as=\"s\" hint-placeholder-count=\"3\">\n        <button type=\"button\" sc-camel-on-click=\"{{onSuggest}}\" data-q=\"{{s.q}}\" style=\"font-size:12.5px;color:#4a5663;background:#fff;border:1px solid #e6e0d4;border-radius:999px;padding:7px 12px;cursor:pointer;font-family:inherit;\" style-hover=\"border-color:#cdc4b2;background:#fcfbf8;\">{{s.label}}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===================== TILE GRID ===================== -->\n  <div style=\"display:grid;grid-template-columns:{{gridCols}};gap:16px;margin-top:22px;\">\n\n    <!-- ---- FIVE SECTIONS, MIRRORING THE FRONT-DOOR PRIORITIES ---- -->\n    <sc-for list=\"{{sectionHeaders}}\" as=\"sh\" hint-placeholder-count=\"6\">\n      <div style=\"order:{{sh.hdrOrd}};grid-column:1 / -1;margin-top:8px;\">\n        <button type=\"button\" sc-camel-on-click=\"{{toggleSec}}\" data-sec=\"{{sh.key}}\" aria-expanded=\"{{sh.openAria}}\" style=\"width:100%;text-align:left;background:none;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;padding:6px 0;\">\n          <span class=\"cs\" style=\"font-size:16px;font-weight:700;color:#15293f;\">{{sh.title}}<\u002Fspan>\n          <span style=\"font-size:13px;color:#6f7d8c;flex:1;min-width:0;\">{{sh.sub}}<\u002Fspan>\n          <span aria-hidden=\"true\" style=\"display:inline-flex;color:#bf8a2e;font-size:12px;transform:{{sh.chev}};transition:transform .18s;\">▾<\u002Fspan>\n        <\u002Fbutton>\n        <sc-if value=\"{{sh.collapsed}}\" hint-placeholder-val=\"{{false}}\">\n          <div style=\"font-size:12.5px;color:#a3a9b1;padding:0 0 8px;\">{{sh.summary}}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n\n    <!-- ===== TODAY'S TASKS ===== -->\n    <section aria-label=\"Today's tasks\" hidden=\"{{tasksHidden}}\" style=\"order:{{ordTasks}};grid-column:{{spanTasks}};background:#fff;border:1px solid #e6e0d4;border-radius:9px;padding:20px 22px;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;\">\n        <div style=\"display:flex;align-items:center;gap:9px;min-width:0;\">\n          <span aria-hidden=\"true\" style=\"display:inline-flex;\">{{listIcon}}<\u002Fspan>\n          <div class=\"cs\" style=\"font-size:18px;font-weight:700;color:#15293f;\">Today’s tasks<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{isStore}}\" hint-placeholder-val=\"{{true}}\">\n          <div style=\"display:flex;align-items:center;gap:10px;\">\n            <div style=\"width:130px;height:8px;background:#f1ece1;border-radius:5px;overflow:hidden;\">\n              <div style=\"height:100%;width:{{tasksPct}};background:#2f6b4f;border-radius:5px;transition:width .3s;\"><\u002Fdiv>\n            <\u002Fdiv>\n            <span class=\"cs\" style=\"font-size:13.5px;font-weight:700;color:#15293f;white-space:nowrap;\">{{tasksDoneCount}} of {{tasksTotal}}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{isStore}}\" hint-placeholder-val=\"{{true}}\">\n        <div style=\"margin-top:14px;\">\n          <sc-for list=\"{{tasks}}\" as=\"t\" hint-placeholder-count=\"5\">\n            <button type=\"button\" sc-camel-on-click=\"{{toggleTask}}\" data-task=\"{{t.id}}\" style=\"width:100%;text-align:left;background:none;border:none;border-bottom:1px solid #f3efe6;cursor:pointer;font-family:inherit;display:grid;grid-template-columns:24px 1fr auto;gap:12px;align-items:center;padding:13px 2px;\">\n              <span aria-hidden=\"true\" style=\"width:22px;height:22px;border-radius:50%;border:2px solid {{t.checkBorder}};background:{{t.checkBg}};display:inline-flex;align-items:center;justify-content:center;\">{{t.checkEl}}<\u002Fspan>\n              <span style=\"min-width:0;\">\n                <span style=\"display:block;font-size:14px;font-weight:500;color:{{t.titleColor}};text-decoration:{{t.strike}};\">{{t.title}}<\u002Fspan>\n                <span style=\"display:block;font-size:12px;color:#8a94a0;margin-top:1px;\">{{t.due}}<\u002Fspan>\n              <\u002Fspan>\n              <span style=\"flex:none;font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:{{t.catColor}};background:{{t.catBg}};border-radius:5px;padding:4px 9px;\">{{t.cat}}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n          <div style=\"font-size:12.5px;color:#8a94a0;font-style:italic;line-height:1.5;margin-top:13px;\">Every task completed feeds the data engine. The walk-in count triggers tonight’s AI order.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{isMulti}}\" hint-placeholder-val=\"{{false}}\">\n        <div style=\"font-size:12.5px;color:#8a94a0;margin-top:3px;\">Task completion across outlets today.<\u002Fdiv>\n        <div style=\"margin-top:13px;display:flex;flex-direction:column;gap:1px;\">\n          <sc-for list=\"{{tasksEstate}}\" as=\"o\" hint-placeholder-count=\"4\">\n            <div style=\"display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;padding:12px 2px;border-bottom:1px solid #f3efe6;\">\n              <span style=\"font-size:14px;font-weight:500;color:#15293f;min-width:0;\">{{o.name}}<\u002Fspan>\n              <span class=\"cs\" style=\"font-size:14px;font-weight:700;color:#15293f;\">{{o.rate}}<\u002Fspan>\n              <span style=\"flex:none;font-size:11.5px;font-weight:600;color:{{o.color}};background:{{o.bg}};border-radius:5px;padding:4px 9px;white-space:nowrap;\">{{o.overdue}}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsection>\n\n    <!-- ===== WILL I RUN SHORT (ordering hero) ===== -->\n    <section aria-label=\"Will I run short\" hidden=\"{{s4Hidden}}\" style=\"order:{{ordRunShort}};grid-column:{{spanRunShort}};background:#fff;border:1px solid #e6e0d4;border-left:4px solid #bf8a2e;border-radius:9px;padding:20px 22px;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;\">\n        <div class=\"cs\" style=\"font-size:18px;font-weight:700;color:#15293f;\">{{runShortLabel}}<\u002Fdiv>\n        <span style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#2f6b4f;background:#eaf1ed;border:1px solid #cfe1d6;border-radius:5px;padding:3px 8px;\">Live data<\u002Fspan>\n      <\u002Fdiv>\n\n      <div role=\"status\" style=\"display:flex;align-items:flex-start;gap:10px;margin-top:13px;background:#faf2df;border:1px solid #ecdcb6;border-left:3px solid #bf8a2e;border-radius:5px;padding:11px 14px;\">\n        <span aria-hidden=\"true\" style=\"flex:none;margin-top:1px;color:#bf8a2e;\">{{alertIcon}}<\u002Fspan>\n        <div style=\"font-size:14px;line-height:1.5;color:#15293f;\">{{collision.banner}}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- store: chart -->\n      <sc-if value=\"{{storeWeekHero}}\" hint-placeholder-val=\"{{true}}\">\n        <svg sc-camel-view-box=\"0 0 520 224\" width=\"100%\" style=\"display:block;margin-top:16px;overflow:visible;\" role=\"img\" aria-label=\"Projected mozzarella stock from Wednesday to Monday. The recommended order ends with about six pounds to spare. Doing nothing stocks out on Saturday. Over ordering leaves about thirty five pounds that spoil.\">\n          <rect x=\"212\" y=\"20\" width=\"172\" height=\"160\" fill=\"#f6edda\"><\u002Frect>\n          <text x=\"298\" y=\"14\" text-anchor=\"middle\" font-size=\"10\" letter-spacing=\"1.2\" fill=\"#a08a5c\" font-family=\"Georgia,serif\">PROMOTION<\u002Ftext>\n          <line x1=\"40\" y1=\"180\" x2=\"470\" y2=\"180\" stroke=\"#e6e0d4\" stroke-width=\"1\"><\u002Fline>\n          <line x1=\"40\" y1=\"18\" x2=\"40\" y2=\"180\" stroke=\"#bf8a2e\" stroke-width=\"1.4\" stroke-dasharray=\"5 4\"><\u002Fline>\n          <text x=\"46\" y=\"28\" font-size=\"9.5\" letter-spacing=\".5\" font-weight=\"700\" fill=\"#bf8a2e\">ORDER BY WED<\u002Ftext>\n          <polyline points=\"40,134 126,136 212,140 298,180 384,180 470,180\" fill=\"none\" stroke=\"#aeb4bb\" stroke-width=\"2\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n          <polyline points=\"40,134 126,30 212,59 298,111 384,140 470,140\" fill=\"none\" stroke=\"#cda45a\" stroke-width=\"2\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n          <polyline points=\"40,134 126,36 212,70 298,111 384,173 470,173\" fill=\"none\" stroke=\"#2f6b4f\" stroke-width=\"3.4\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n          <circle cx=\"40\" cy=\"134\" r=\"3.6\" fill=\"#15293f\"><\u002Fcircle>\n          <circle cx=\"298\" cy=\"180\" r=\"4.6\" fill=\"#b23a2e\"><\u002Fcircle>\n          <text x=\"298\" y=\"170\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"600\" fill=\"#b23a2e\">stock out Sat<\u002Ftext>\n          <circle cx=\"470\" cy=\"140\" r=\"4.2\" fill=\"#bf8a2e\"><\u002Fcircle>\n          <circle cx=\"470\" cy=\"173\" r=\"3.6\" fill=\"#2f6b4f\"><\u002Fcircle>\n          <text x=\"40\" y=\"200\" text-anchor=\"middle\" font-size=\"11\" fill=\"#6f7d8c\">Wed<\u002Ftext>\n          <text x=\"126\" y=\"200\" text-anchor=\"middle\" font-size=\"11\" fill=\"#6f7d8c\">Thu<\u002Ftext>\n          <text x=\"212\" y=\"200\" text-anchor=\"middle\" font-size=\"11\" fill=\"#6f7d8c\">Fri<\u002Ftext>\n          <text x=\"298\" y=\"200\" text-anchor=\"middle\" font-size=\"11\" fill=\"#6f7d8c\">Sat<\u002Ftext>\n          <text x=\"384\" y=\"200\" text-anchor=\"middle\" font-size=\"11\" fill=\"#6f7d8c\">Sun<\u002Ftext>\n          <text x=\"470\" y=\"200\" text-anchor=\"middle\" font-size=\"11\" fill=\"#6f7d8c\">Mon<\u002Ftext>\n        <\u002Fsvg>\n        <div style=\"display:flex;flex-wrap:wrap;gap:10px 18px;margin-top:10px;\">\n          <span style=\"display:flex;align-items:center;gap:7px;font-size:12.5px;color:#15293f;\"><span aria-hidden=\"true\" style=\"width:20px;height:0;border-top:3.4px solid #2f6b4f;\"><\u002Fspan>Order 90 lb <span style=\"color:#8a94a0;\">6 lb to spare<\u002Fspan><\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:7px;font-size:12.5px;color:#15293f;\"><span aria-hidden=\"true\" style=\"width:20px;height:0;border-top:2px solid #aeb4bb;\"><\u002Fspan>Do nothing <span style=\"color:#8a94a0;\">out Sat<\u002Fspan><\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:7px;font-size:12.5px;color:#15293f;\"><span aria-hidden=\"true\" style=\"width:20px;height:0;border-top:2px solid #cda45a;\"><\u002Fspan>Over order <span style=\"color:#8a94a0;\">35 lb spoils<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:14px;padding-top:14px;border-top:1px solid #efe9dd;\">\n          <div style=\"font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#a3956f;margin-bottom:9px;\">How we got here<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:7px;\">\n            <sc-for list=\"{{trace}}\" as=\"t\" hint-placeholder-count=\"7\">\n              <div style=\"display:flex;align-items:center;gap:7px;\">\n                <div style=\"background:#f7f4ee;border:1px solid #ece6d9;border-radius:7px;padding:6px 10px;\">\n                  <div style=\"font-size:12.5px;font-weight:600;color:#15293f;line-height:1.1;\">{{t.v}}<\u002Fdiv>\n                  <div style=\"font-size:9.5px;color:#a3956f;margin-top:1px;\">{{t.s}}<\u002Fdiv>\n                <\u002Fdiv>\n                <span aria-hidden=\"true\" style=\"color:#cdc4b2;font-size:13px;\">{{t.arrow}}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px;padding-top:14px;border-top:1px solid #efe9dd;flex-wrap:wrap;\">\n          <div style=\"font-size:13.5px;color:#3c4a5a;max-width:330px;\">Order 90 lb mozzarella by Wed noon. <span style=\"font-weight:600;color:#2f6b4f;\">Protects about $3,100 of pizza gross profit.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;\">\n            <a href=\"The Collision.dc.html\" style=\"font-size:13px;font-weight:600;color:#6f7d8c;text-decoration:none;\" style-hover=\"text-decoration:underline;\">Full breakdown →<\u002Fa>\n            <sc-if value=\"{{orderIdle}}\" hint-placeholder-val=\"{{true}}\">\n              <button type=\"button\" sc-camel-on-click=\"{{placeOrder}}\" style=\"border:none;border-radius:7px;background:#15293f;color:#fff;font-size:13.5px;font-weight:600;padding:10px 16px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">Place this order<\u002Fbutton>\n            <\u002Fsc-if>\n            <sc-if value=\"{{orderPlaced}}\" hint-placeholder-val=\"{{false}}\">\n              <span style=\"display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#2f6b4f;\">{{checkIcon}} Order placed <button type=\"button\" sc-camel-on-click=\"{{undoOrder}}\" style=\"margin-left:4px;font-size:12.5px;color:#6f7d8c;background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;\">Undo<\u002Fbutton><\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:14px;padding-top:14px;border-top:1px solid #efe9dd;\">\n          <div style=\"font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#a3956f;margin-bottom:8px;\">Other orders due this week<\u002Fdiv>\n          <div role=\"table\" style=\"display:flex;flex-direction:column;gap:1px;\">\n            <sc-for list=\"{{ordersDue}}\" as=\"o\" hint-placeholder-count=\"3\">\n              <div role=\"row\" style=\"display:grid;grid-template-columns:1fr 92px 84px;gap:8px;align-items:center;padding:9px 2px;border-bottom:1px solid #f3efe6;\">\n                <span role=\"cell\" style=\"font-size:13.5px;font-weight:500;color:#15293f;\">{{o.name}}<\u002Fspan>\n                <span role=\"cell\" class=\"cs\" style=\"font-size:14px;font-weight:700;color:{{o.color}};text-align:right;\">{{o.order}}<\u002Fspan>\n                <span role=\"cell\" style=\"font-size:12px;color:#8a94a0;text-align:right;\">{{o.due}}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{multiWeek}}\" hint-placeholder-val=\"{{false}}\">\n        <div style=\"margin-top:15px;display:flex;flex-direction:column;gap:1px;\">\n          <sc-for list=\"{{collision.outlets}}\" as=\"o\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 2px;border-bottom:1px solid #efe9dd;\">\n              <div style=\"min-width:0;\">\n                <div style=\"font-size:14.5px;font-weight:600;color:#15293f;\">{{o.name}}<\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#8a94a0;\">{{o.note}}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"text-align:right;flex:none;\">\n                <div class=\"cs\" style=\"font-size:18px;font-weight:700;color:#b23a2e;\">{{o.short}}<\u002Fdiv>\n                <div style=\"font-size:11.5px;color:#8a94a0;\">by {{o.due}}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px;flex-wrap:wrap;\">\n          <div style=\"font-size:13.5px;color:#3c4a5a;\">{{collision.multiAction}}<\u002Fdiv>\n          <a href=\"The Collision.dc.html\" style=\"font-size:13px;font-weight:600;color:#6f7d8c;text-decoration:none;\" style-hover=\"text-decoration:underline;\">See one outlet in full →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- season: readiness build -->\n      <sc-if value=\"{{isSeason}}\" hint-placeholder-val=\"{{false}}\">\n        <div style=\"margin-top:15px;display:flex;flex-direction:column;gap:1px;\">\n          <sc-for list=\"{{seasonReady}}\" as=\"r\" hint-placeholder-count=\"4\">\n            <div style=\"display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:11px 2px;border-bottom:1px solid #f3efe6;\">\n              <div style=\"min-width:0;\">\n                <div style=\"font-size:14px;font-weight:600;color:#15293f;\">{{r.name}}<\u002Fdiv>\n                <div style=\"font-size:12px;color:#8a94a0;\">{{r.note}}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:10px;flex:none;\">\n                <span class=\"cs\" style=\"font-size:13.5px;font-weight:700;color:#15293f;\">{{r.val}}<\u002Fspan>\n                <span style=\"font-size:11.5px;font-weight:600;color:{{r.statusColor}};background:{{r.statusBg}};border-radius:5px;padding:3px 8px;white-space:nowrap;\">{{r.status}}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px;flex-wrap:wrap;\">\n          <div style=\"font-size:13px;color:#3c4a5a;max-width:340px;\">Par build spans June to August. Nothing is ordered until you confirm each step.<\u002Fdiv>\n          <a href=\"The Collision.dc.html\" style=\"font-size:13px;font-weight:600;color:#6f7d8c;text-decoration:none;\" style-hover=\"text-decoration:underline;\">Full breakdown →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsection>\n\n    <!-- ===== WORTH KNOWING (insights, navy standout, rotating) ===== -->\n    <section aria-label=\"Worth knowing\" hidden=\"{{moreHidden}}\" style=\"order:{{ordInsights}};grid-column:{{spanInsights}};background:#15293f;border-radius:9px;padding:20px 22px;display:{{insightsDisp}};flex-direction:column;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;\">\n        <div style=\"display:flex;align-items:center;gap:8px;\">\n          <span aria-hidden=\"true\" style=\"color:#e6b566;display:inline-flex;\">{{sparkIcon}}<\u002Fspan>\n          <span class=\"cs\" style=\"font-size:17px;font-weight:700;color:#fdf6e7;\">Worth knowing<\u002Fspan>\n        <\u002Fdiv>\n        <span style=\"font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#9fb0c6;border:1px solid #2f4a66;border-radius:5px;padding:3px 7px;\">Always on<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:12px;color:#8ea1b8;margin-top:3px;\">Things you did not think to ask<\u002Fdiv>\n\n      <div style=\"flex:1;margin-top:16px;display:flex;flex-direction:column;justify-content:center;min-height:96px;\">\n        <div class=\"cs\" style=\"font-size:32px;font-weight:700;color:#e6b566;line-height:1;\">{{insight.num}}<\u002Fdiv>\n        <div style=\"font-size:14.5px;color:#eaf0f6;line-height:1.4;margin-top:9px;\">{{insight.line}}<\u002Fdiv>\n        <div style=\"display:flex;align-items:flex-start;gap:7px;margin-top:11px;\">\n          <span aria-hidden=\"true\" style=\"flex:none;margin-top:1px;color:#7e8ea4;\">→<\u002Fspan>\n          <div style=\"font-size:13px;color:#9fb0c6;line-height:1.45;\">{{insight.action}}<\u002Fdiv>\n        <\u002Fdiv>\n        <button type=\"button\" sc-camel-on-click=\"{{actInsight}}\" data-q=\"{{insight.q}}\" style=\"align-self:flex-start;margin-top:13px;font-size:12.5px;font-weight:600;color:#15293f;background:#e6b566;border:none;border-radius:7px;padding:8px 13px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#edc079;\">Act on this →<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:14px;\">\n        <div aria-hidden=\"true\" style=\"display:flex;gap:5px;\">\n          <sc-for list=\"{{insightDots}}\" as=\"d\" hint-placeholder-count=\"5\">\n            <span style=\"width:6px;height:6px;border-radius:50%;background:{{d.c}};\"><\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <button type=\"button\" sc-camel-on-click=\"{{nextInsight}}\" aria-label=\"Next insight\" style=\"font-size:11px;color:#9fb0c6;background:none;border:none;cursor:pointer;font-family:inherit;padding:0;\" style-hover=\"color:#eaf0f6;\">from your analytics · next →<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== SMART ORDERING (challenge + voice) ===== -->\n    <section aria-label=\"Smart ordering\" hidden=\"{{moreHidden}}\" style=\"order:{{ordSmart}};grid-column:{{spanSmart}};background:#fff;border:1px solid #e6e0d4;border-radius:9px;padding:20px 22px;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;\">\n        <div class=\"cs\" style=\"font-size:18px;font-weight:700;color:#15293f;\">Smart ordering<\u002Fdiv>\n        <span style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#2f6b4f;background:#eaf1ed;border:1px solid #cfe1d6;border-radius:5px;padding:3px 8px;\">Live data<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#8a94a0;margin-top:2px;\">Every order checked against weather, season and last year.<\u002Fdiv>\n\n      <!-- store: interactive challenge + voice -->\n      <sc-if value=\"{{isStore}}\" hint-placeholder-val=\"{{true}}\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:15px;padding:12px 13px;background:#f7f4ee;border:1px solid #ece6d9;border-radius:9px;\">\n          <div>\n            <div style=\"font-size:14px;font-weight:600;color:#15293f;\">Cod, 60 lb for next week<\u002Fdiv>\n            <div style=\"font-size:12px;color:#8a94a0;margin-top:1px;\">Your draft order<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"flex:none;font-size:11px;font-weight:600;color:#b6831f;background:#fbf3e3;border-radius:5px;padding:3px 8px;\">Flagged<\u002Fspan>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{smartChallenge}}\" hint-placeholder-val=\"{{true}}\">\n          <div style=\"margin-top:12px;background:#faf2df;border:1px solid #ecdcb6;border-left:3px solid #bf8a2e;border-radius:8px;padding:13px 14px;\">\n            <div style=\"display:flex;align-items:flex-start;gap:9px;\">\n              <span aria-hidden=\"true\" style=\"flex:none;margin-top:1px;color:#bf8a2e;\">{{alertIcon}}<\u002Fspan>\n              <div style=\"font-size:13.5px;color:#15293f;line-height:1.5;\">Weather is poor next week and this is twice what you ordered last year. Confirm the larger order?<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:9px;margin-top:12px;\">\n              <button type=\"button\" sc-camel-on-click=\"{{smartConfirm}}\" style=\"flex:1;height:42px;border:1px solid #d9d2c4;border-radius:8px;background:#fff;color:#15293f;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;\" style-hover=\"background:#f7f4ee;\">Confirm anyway<\u002Fbutton>\n              <button type=\"button\" sc-camel-on-click=\"{{smartAdjust}}\" style=\"flex:1;height:42px;border:none;border-radius:8px;background:#15293f;color:#fff;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">Adjust to last year<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{smartWhy}}\" hint-placeholder-val=\"{{false}}\">\n          <div style=\"margin-top:12px;background:#f4f8f5;border:1px solid #d6e6dc;border-radius:8px;padding:14px;text-align:center;\">\n            <div style=\"font-size:13.5px;color:#2c4a39;line-height:1.5;\">Confirmed. Tell us why, in your words. Next year the forecast learns from it.<\u002Fdiv>\n            <button type=\"button\" sc-camel-on-click=\"{{smartTalk}}\" aria-label=\"Tap to record your reason\" style=\"margin:13px auto 0;width:54px;height:54px;border-radius:50%;border:none;background:#15293f;color:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-family:inherit;\" style-hover=\"background:#22364d;\">{{micIcon}}<\u002Fbutton>\n            <div style=\"font-size:12px;color:#6f7d8c;margin-top:9px;\">Tap and speak, no typing<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{smartRecording}}\" hint-placeholder-val=\"{{false}}\">\n          <div style=\"margin-top:12px;background:#f4f8f5;border:1px solid #d6e6dc;border-radius:8px;padding:14px;text-align:center;\">\n            <div style=\"position:relative;width:54px;height:54px;margin:0 auto;display:inline-flex;align-items:center;justify-content:center;\">\n              <span aria-hidden=\"true\" style=\"position:absolute;inset:0;border-radius:50%;background:#2f6b4f;animation:soPulse 1.5s ease-out infinite;\"><\u002Fspan>\n              <span style=\"position:relative;width:54px;height:54px;border-radius:50%;background:#2f6b4f;color:#fff;display:inline-flex;align-items:center;justify-content:center;\">{{micIcon}}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:13px;font-weight:600;color:#2f6b4f;margin-top:10px;\">Listening<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{smartCaptured}}\" hint-placeholder-val=\"{{false}}\">\n          <div style=\"margin-top:12px;background:#eaf1ed;border:1px solid #cfe1d6;border-radius:8px;padding:13px 14px;\">\n            <div style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#2f6b4f;\">Reason saved with the order<\u002Fdiv>\n            <div class=\"cs\" style=\"font-size:15px;color:#15293f;line-height:1.45;margin-top:6px;\">“Batch prepping cod for next week.”<\u002Fdiv>\n            <button type=\"button\" sc-camel-on-click=\"{{smartReset}}\" style=\"margin-top:10px;font-size:12.5px;color:#6f7d8c;background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;\">Record again<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{smartAdjusted}}\" hint-placeholder-val=\"{{false}}\">\n          <div style=\"margin-top:12px;background:#eaf1ed;border:1px solid #cfe1d6;border-radius:8px;padding:13px 14px;display:flex;align-items:center;gap:10px;\">\n            <span aria-hidden=\"true\" style=\"flex:none;color:#2f6b4f;\">{{checkIcon}}<\u002Fspan>\n            <div style=\"font-size:13.5px;color:#15293f;line-height:1.45;\">Order set to last year, 30 lb. Saves about $180 of likely waste. <button type=\"button\" sc-camel-on-click=\"{{smartReset}}\" style=\"font-size:12.5px;color:#6f7d8c;background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;\">Undo<\u002Fbutton><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsc-if>\n\n      <!-- multi: flagged list -->\n      <sc-if value=\"{{isMulti}}\" hint-placeholder-val=\"{{false}}\">\n        <div style=\"margin-top:14px;display:flex;flex-direction:column;gap:1px;\">\n          <sc-for list=\"{{smartFlags}}\" as=\"f\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;align-items:flex-start;gap:10px;padding:11px 2px;border-bottom:1px solid #f3efe6;\">\n              <span aria-hidden=\"true\" style=\"flex:none;margin-top:2px;color:#bf8a2e;\">{{alertIconSm}}<\u002Fspan>\n              <div style=\"min-width:0;\">\n                <div style=\"font-size:13.5px;font-weight:600;color:#15293f;\">{{f.o}}<\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#8a94a0;\">{{f.r}}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font-size:12px;color:#8a94a0;margin-top:12px;\">Managers asked to confirm or adjust before the deadline.<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsection>\n\n    <!-- ===== WASTE ===== -->\n    <section aria-label=\"Waste\" hidden=\"{{moreHidden}}\" style=\"order:{{ordWaste}};grid-column:{{spanWaste}};background:#fff;border:1px solid #e6e0d4;border-left:4px solid #b6831f;border-radius:9px;padding:20px 22px;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;\">\n        <div class=\"cs\" style=\"font-size:18px;font-weight:700;color:#15293f;\">Waste<\u002Fdiv>\n        <span style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#2f6b4f;background:#eaf1ed;border:1px solid #cfe1d6;border-radius:5px;padding:3px 8px;\">Live data<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-top:13px;\">\n        <div style=\"min-width:0;\">\n          <div style=\"display:flex;align-items:baseline;gap:8px;\">\n            <span class=\"cs\" style=\"font-size:34px;font-weight:700;color:{{wasteHeadColor}};line-height:1;\">{{waste.headline}}<\u002Fspan>\n            <span style=\"font-size:13px;color:#6f7d8c;\">{{waste.sub}}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#b23a2e;margin-top:5px;\">{{waste.trendNote}}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:none;\">{{wasteTrendEl}}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;margin-top:17px;\">Where it comes from<\u002Fdiv>\n      <div style=\"margin-top:9px;display:flex;flex-direction:column;gap:9px;\">\n        <sc-for list=\"{{wasteCauses}}\" as=\"c\" hint-placeholder-count=\"4\">\n          <div style=\"display:grid;grid-template-columns:1fr 56px;gap:10px;align-items:center;\">\n            <div style=\"min-width:0;\">\n              <div style=\"display:flex;align-items:center;gap:7px;\">\n                <span style=\"font-size:12.5px;color:#3c4a5a;\">{{c.label}}<\u002Fspan>\n                <sc-if value=\"{{c.isLink}}\" hint-placeholder-val=\"{{false}}\">\n                  <button type=\"button\" sc-camel-on-click=\"{{openRecipe}}\" style=\"font-size:10.5px;font-weight:600;color:#b23a2e;background:#fdecec;border:none;border-radius:4px;padding:2px 6px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#fbdedd;\">same as margin leak →<\u002Fbutton>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"margin-top:5px;height:7px;background:#f1ece1;border-radius:4px;overflow:hidden;\">\n                <div style=\"height:100%;width:{{c.barW}};background:{{c.color}};border-radius:4px;\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <span class=\"cs\" style=\"font-size:14px;font-weight:700;color:#15293f;text-align:right;\">{{c.val}}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:16px;background:#fbf3e3;border:1px solid #ecdcb8;border-radius:8px;padding:11px 13px;\">\n        <div style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#b6831f;\">Predicted next<\u002Fdiv>\n        <div style=\"font-size:13px;color:#3c4a5a;line-height:1.45;margin-top:4px;\">{{waste.predict}}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:15px;\">\n        <sc-if value=\"{{wasteIdle}}\" hint-placeholder-val=\"{{true}}\">\n          <button type=\"button\" sc-camel-on-click=\"{{setWasteAlert}}\" style=\"width:100%;border:none;border-radius:7px;background:#15293f;color:#fff;font-size:13px;font-weight:600;padding:11px 14px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">{{waste.actionLabel}}<\u002Fbutton>\n          <div style=\"font-size:12px;color:#8a94a0;margin-top:7px;line-height:1.45;\">{{waste.saves}}. {{waste.inaction}} Nothing changes until you confirm.<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{wastePlaced}}\" hint-placeholder-val=\"{{false}}\">\n          <span style=\"display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#2f6b4f;\">{{checkIcon}} Applied to next order <button type=\"button\" sc-camel-on-click=\"{{undoWasteAlert}}\" style=\"margin-left:4px;font-size:12.5px;color:#6f7d8c;background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;\">Undo<\u002Fbutton><\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== INVENTORY ===== -->\n    <section aria-label=\"Inventory management\" hidden=\"{{s3Hidden}}\" style=\"order:{{ordInventory}};grid-column:{{spanInventory}};background:#fff;border:1px solid #e6e0d4;border-radius:9px;padding:20px 22px;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;\">\n        <div class=\"cs\" style=\"font-size:18px;font-weight:700;color:#15293f;\">Inventory<\u002Fdiv>\n        <span style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#2f6b4f;background:#eaf1ed;border:1px solid #cfe1d6;border-radius:5px;padding:3px 8px;\">Live data<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#8a94a0;margin-top:2px;\">{{inventorySub}}<\u002Fdiv>\n\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;\">\n        <div style=\"flex:1;min-width:130px;background:#faf8f3;border:1px solid #eee9dd;border-radius:8px;padding:11px 13px;\">\n          <div style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;\">Capital in stock<\u002Fdiv>\n          <div class=\"cs\" style=\"font-size:20px;font-weight:700;color:#15293f;margin-top:3px;\">{{invSummary.capital}}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:130px;background:#faf8f3;border:1px solid #eee9dd;border-radius:8px;padding:11px 13px;\">\n          <div style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;\">To order<\u002Fdiv>\n          <div class=\"cs\" style=\"font-size:20px;font-weight:700;color:#b6831f;margin-top:3px;\">{{invSummary.orderCost}}<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#8a94a0;margin-top:1px;\">{{invSummary.orderHead}}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:130px;background:#faf8f3;border:1px solid #eee9dd;border-radius:8px;padding:11px 13px;\">\n          <div style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;\">Shrinkage this week<\u002Fdiv>\n          <div class=\"cs\" style=\"font-size:20px;font-weight:700;color:#b23a2e;margin-top:3px;\">{{invSummary.shrink}}<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#8a94a0;margin-top:1px;\">count vs recipe usage<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- footfall-adjusted reorder levels (prior inventory lifted to forecast covers) -->\n      <div style=\"margin-top:16px;border-left:3px solid #bf8a2e;background:#fcf8ef;border-radius:0 9px 9px 0;padding:14px 16px;\">\n        <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;\">\n          <span style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#b6831f;\">Reorder levels, lifted for footfall<\u002Fspan>\n          <span style=\"font-size:10.5px;font-weight:600;color:#bf8a2e;background:#fbf3e3;border:1px solid #ecdcb8;border-radius:5px;padding:2px 7px;\">{{reorderLift.lift}} {{reorderLift.peak}}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1.05fr 1fr;gap:18px;margin-top:11px;align-items:center;\">\n          <div style=\"font-size:13px;color:#3c4a5a;line-height:1.5;min-width:0;\">{{reorderLift.note}}<\u002Fdiv>\n          <div style=\"min-width:0;\">\n            {{reorderLiftEl}}\n            <div style=\"display:flex;align-items:center;gap:14px;margin-top:8px;font-size:10.5px;color:#8a94a0;flex-wrap:wrap;\">\n              <span style=\"display:inline-flex;align-items:center;gap:5px;\"><span style=\"width:11px;height:8px;border-radius:2px;background:#e4ddcf;display:inline-block;\"><\u002Fspan>prior level<\u002Fspan>\n              <span style=\"display:inline-flex;align-items:center;gap:5px;\"><span style=\"width:11px;height:8px;border-radius:2px;background:#bf8a2e;display:inline-block;\"><\u002Fspan>footfall lift<\u002Fspan>\n              <span style=\"display:inline-flex;align-items:center;gap:5px;\"><span style=\"width:2px;height:12px;background:#15293f;display:inline-block;\"><\u002Fspan>on hand<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div role=\"table\" style=\"margin-top:16px;\">\n        <div role=\"row\" style=\"display:grid;grid-template-columns:1.5fr 150px 132px 118px;gap:10px;padding:0 2px 9px;border-bottom:1px solid #efe9dd;\">\n          <span role=\"columnheader\" style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;\">{{inventoryCol0}}<\u002Fspan>\n          <span role=\"columnheader\" style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;\">Cover to lead time<\u002Fspan>\n          <span role=\"columnheader\" style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;text-align:right;\">Suggested order<\u002Fspan>\n          <span role=\"columnheader\" style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;text-align:right;\">Shrinkage<\u002Fspan>\n        <\u002Fdiv>\n        <sc-for list=\"{{inventory}}\" as=\"it\" hint-placeholder-count=\"5\">\n          <div role=\"row\" style=\"display:grid;grid-template-columns:1.5fr 150px 132px 118px;gap:10px;align-items:center;padding:12px 2px;border-bottom:1px solid #f3efe6;\">\n            <div role=\"cell\" style=\"min-width:0;\">\n              <div style=\"font-size:13.5px;font-weight:600;color:#15293f;\">{{it.name}}<\u002Fdiv>\n              <sc-if value=\"{{it.note}}\" hint-placeholder-val=\"{{false}}\">\n                <div style=\"font-size:11.5px;color:#8a94a0;margin-top:1px;\">{{it.note}}<\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"font-size:11px;color:#b8bcc2;margin-top:1px;\">counted {{it.counted}}<\u002Fdiv>\n            <\u002Fdiv>\n            <div role=\"cell\" style=\"display:flex;align-items:center;gap:9px;\">\n              <span style=\"flex:none;\">{{it.sparkEl}}<\u002Fspan>\n              <span style=\"font-size:12px;font-weight:600;color:{{it.coverColor}};line-height:1.2;\">{{it.cover}}<\u002Fspan>\n            <\u002Fdiv>\n            <div role=\"cell\" style=\"text-align:right;\">\n              <sc-if value=\"{{it.hasOrder}}\" hint-placeholder-val=\"{{false}}\">\n                <div class=\"cs\" style=\"font-size:13.5px;font-weight:700;color:#15293f;\">{{it.orderCost}}<\u002Fdiv>\n                <div style=\"font-size:11.5px;color:#6f7d8c;\">{{it.order}}<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div role=\"cell\" style=\"text-align:right;\">\n              <sc-if value=\"{{it.hasVar}}\" hint-placeholder-val=\"{{false}}\">\n                <span style=\"font-size:12px;font-weight:600;color:#b23a2e;background:#fdecec;border-radius:5px;padding:3px 7px;white-space:nowrap;\">{{it.varText}}<\u002Fspan>\n              <\u002Fsc-if>\n              <sc-if value=\"{{it.noVar}}\" hint-placeholder-val=\"{{false}}\">\n                <span style=\"font-size:12px;color:#a3a9b1;\">on book<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:16px;flex-wrap:wrap;\">\n        <div style=\"font-size:12.5px;color:#8a94a0;max-width:380px;line-height:1.45;\">Order quantities are computed from your forecast, recipes and supplier lead times, priced at your live vendor rates. Nothing is sent until you confirm.<\u002Fdiv>\n        <sc-if value=\"{{invIdle}}\" hint-placeholder-val=\"{{true}}\">\n          <button type=\"button\" sc-camel-on-click=\"{{addInvOrder}}\" style=\"flex:none;border:none;border-radius:7px;background:#15293f;color:#fff;font-size:13px;font-weight:600;padding:11px 16px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">{{invSummary.addLabel}}<\u002Fbutton>\n        <\u002Fsc-if>\n        <sc-if value=\"{{invPlaced}}\" hint-placeholder-val=\"{{false}}\">\n          <span style=\"flex:none;display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#2f6b4f;\">{{checkIcon}} Order drafted <button type=\"button\" sc-camel-on-click=\"{{undoInvOrder}}\" style=\"margin-left:4px;font-size:12.5px;color:#6f7d8c;background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;\">Undo<\u002Fbutton><\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== ORDER MANAGEMENT ===== -->\n    <section aria-label=\"Order management\" hidden=\"{{s4Hidden}}\" style=\"order:{{ordOrders}};grid-column:{{spanOrders}};background:#fff;border:1px solid #e6e0d4;border-radius:9px;padding:20px 22px;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;\">\n        <div class=\"cs\" style=\"font-size:18px;font-weight:700;color:#15293f;\">Order management<\u002Fdiv>\n        <span style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#2f6b4f;background:#eaf1ed;border:1px solid #cfe1d6;border-radius:5px;padding:3px 8px;\">Live data<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#8a94a0;margin-top:2px;\">{{ordersSummary.sub}}. Reorder levels trigger the order, this tracks it from draft to delivered.<\u002Fdiv>\n\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;\">\n        <div style=\"flex:1;min-width:120px;background:#faf8f3;border:1px solid #eee9dd;border-radius:8px;padding:11px 13px;\">\n          <div style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;\">Open orders<\u002Fdiv>\n          <div class=\"cs\" style=\"font-size:20px;font-weight:700;color:#15293f;margin-top:3px;\">{{ordersSummary.open}}<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#8a94a0;margin-top:1px;\">{{ordersSummary.openVal}} in flight<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:120px;background:#faf8f3;border:1px solid #eee9dd;border-radius:8px;padding:11px 13px;\">\n          <div style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;\">Arriving<\u002Fdiv>\n          <div class=\"cs\" style=\"font-size:20px;font-weight:700;color:#15293f;margin-top:3px;\">{{ordersSummary.arriving}}<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#8a94a0;margin-top:1px;\">against purchase order<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:120px;background:#faf8f3;border:1px solid #eee9dd;border-radius:8px;padding:11px 13px;\">\n          <div style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3a9b1;\">Delivery variances<\u002Fdiv>\n          <div class=\"cs\" style=\"font-size:20px;font-weight:700;color:#b6831f;margin-top:3px;\">{{ordersSummary.variances}}<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#8a94a0;margin-top:1px;\">received vs ordered<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div
