document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tyle: normal;\n  font-weight: 500;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"e7c86300-53c7-4d58-9b8d-042f5e75a7ac\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 500;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"6288720e-fbb2-4c60-85a3-c937f33dccac\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"64656a04-de6f-4f96-ad4e-41db8cf38ff7\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"2e67169d-0e5e-4a9e-9c31-3f183bc79e7a\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"7d096b0a-b57d-4ecd-9caf-c7eb29d8e3da\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"e31c46e1-98ce-49be-a490-a6827c7a9ed5\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"e7c86300-53c7-4d58-9b8d-042f5e75a7ac\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"6288720e-fbb2-4c60-85a3-c937f33dccac\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box;}\n  html,body{margin:0;padding:0;}\n  body{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}\n  *:focus{outline:none;}\n  *:focus-visible{outline:2px solid #2f6b4f;outline-offset:3px;border-radius:5px;}\n  ::placeholder{color:#a3a9b1;}\n  .cs{font-family:Georgia,'Times New Roman',serif;}\n  @keyframes soPulse{0%{transform:scale(1);opacity:.5}70%{transform:scale(1.85);opacity:0}100%{opacity:0}}\n  @keyframes askFade{0%{opacity:0;transform:translateY(5px)}14%{opacity:1;transform:none}80%{opacity:1;transform:none}100%{opacity:0;transform:translateY(-5px)}}\n  @media (prefers-reduced-motion: reduce){*{transition-duration:.001ms!important;animation-duration:.001ms!important;}}\n  summary{list-style:none;}\n  summary::-webkit-details-marker{display:none;}\n  details[open]>summary span:last-child{transform:rotate(180deg);}\n  details>summary span:last-child{transition:transform .18s;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div data-screen-label=\"Planning cockpit\" style=\"min-height:100vh;background:#f8f6f1;font-family:'IBM Plex Sans',system-ui,-apple-system,Segoe UI,sans-serif;color:#15293f;\">\n\n <!-- ===================== FRONT DOOR (single decision surface) ===================== -->\n <sc-if value=\"{{isDoor}}\" hint-placeholder-val=\"{{true}}\">\n <div data-screen-label=\"Front door\" style=\"max-width:780px;margin:0 auto;padding:30px 30px 72px;\">\n\n   <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:18px;flex-wrap:wrap;padding-bottom:22px;border-bottom:1px solid #e0d8c9;\">\n     <div style=\"min-width:0;\">\n       <div style=\"font-size:11.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#a3956f;\">This week · {{doorView.kicker}}<\u002Fdiv>\n       <div class=\"cs\" style=\"font-size:23px;font-weight:700;color:#15293f;margin-top:4px;\">Outlet 117, Naas Road<\u002Fdiv>\n     <\u002Fdiv>\n     <button type=\"button\" sc-camel-on-click=\"{{setView}}\" data-view=\"full\" style=\"border:1px solid #e0d8c9;background:#fff;border-radius:9px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:#6f7d8c;padding:8px 13px;flex:none;\" style-hover=\"background:#f7f4ee;\">The full picture →<\u002Fbutton>\n   <\u002Fdiv>\n\n   <!-- minimal voice search, routes to the ops platform agents -->\n   <form sc-camel-on-submit=\"{{onSubmit}}\" style=\"margin-top:20px;position:relative;\">\n     <span aria-hidden=\"true\" style=\"position:absolute;left:15px;top:50%;transform:translateY(-50%);color:#a3a9b1;display:inline-flex;\">{{searchIcon}}<\u002Fspan>\n     <sc-if value=\"{{showAskRotate}}\" hint-placeholder-val=\"{{true}}\">\n       <div aria-hidden=\"true\" style=\"position:absolute;left:44px;top:50%;transform:translateY(-50%);font-size:15px;color:#a3a9b1;pointer-events:none;white-space:nowrap;overflow:hidden;\">Ask for {{askWordEl}}<\u002Fdiv>\n     <\u002Fsc-if>\n     <input type=\"text\" value=\"{{searchValue}}\" sc-camel-on-input=\"{{onType}}\" sc-camel-on-focus=\"{{onSearchFocus}}\" sc-camel-on-blur=\"{{onSearchBlur}}\" placeholder=\"{{searchPlaceholder}}\" aria-label=\"Ask the planning agents a question\" readonly=\"{{searchReadonly}}\" style=\"width:100%;height:50px;border:1px solid {{searchBorder}};border-radius:10px;padding:0 56px 0 44px;font-size:15px;color:#15293f;font-family:inherit;background:#fff;\" style-focus=\"border-color:#2f6b4f;box-shadow:0 0 0 3px rgba(47,107,79,.12);\">\n     <button type=\"button\" sc-camel-on-click=\"{{toggleVoice}}\" aria-pressed=\"{{voiceAria}}\" aria-label=\"{{voiceLabel}}\" style=\"position:absolute;right:8px;top:50%;transform:translateY(-50%);width:38px;height:38px;border-radius:9px;border:none;cursor:pointer;background:{{voiceBg}};color:{{voiceColor}};display:inline-flex;align-items:center;justify-content:center;font-family:inherit;\">\n       <sc-if value=\"{{voiceListening}}\" hint-placeholder-val=\"{{false}}\">\n         <span aria-hidden=\"true\" style=\"position:relative;display:inline-flex;align-items:center;justify-content:center;\">\n           <span style=\"position:absolute;width:34px;height:34px;border-radius:50%;background:#2f6b4f;opacity:.35;animation:soPulse 1.4s ease-out infinite;\"><\u002Fspan>\n           <span style=\"position:relative;display:inline-flex;\">{{micIconGreen}}<\u002Fspan>\n         <\u002Fspan>\n       <\u002Fsc-if>\n       <sc-if value=\"{{voiceIdleState}}\" hint-placeholder-val=\"{{true}}\">\n         <span aria-hidden=\"true\">{{micIconGrey}}<\u002Fspan>\n       <\u002Fsc-if>\n     <\u002Fbutton>\n     <sc-if value=\"{{showSuggest}}\" hint-placeholder-val=\"{{false}}\">\n       <div style=\"position:absolute;left:0;right:0;top:58px;z-index:40;background:#fff;border:1px solid #e6e0d4;border-radius:13px;box-shadow:0 18px 44px rgba(21,41,63,.16);padding:7px;overflow:hidden;\">\n         <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 12px 8px;\">\n           <span style=\"font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#a3a9b1;\">{{suggestHeader}}<\u002Fspan>\n           <span style=\"font-size:10.5px;color:#c2b7a3;\">Enter to ask<\u002Fspan>\n         <\u002Fdiv>\n         <sc-for list=\"{{suggestRows}}\" as=\"sg\" hint-placeholder-count=\"4\">\n           <button type=\"button\" sc-camel-on-mouse-down=\"{{pickSuggest}}\" data-q=\"{{sg.q}}\" style=\"width:100%;text-align:left;background:none;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:9px;\" style-hover=\"background:#f6f4ee;\">\n             <span aria-hidden=\"true\" style=\"flex:none;width:8px;height:8px;border-radius:50%;background:{{sg.dot}};\"><\u002Fspan>\n             <span style=\"flex:1;font-size:14.5px;color:#15293f;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{sg.label}}<\u002Fspan>\n             <span style=\"flex:none;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:{{sg.dot}};background:#faf8f3;border-radius:5px;padding:3px 7px;\">{{sg.cat}}<\u002Fspan>\n           <\u002Fbutton>\n         <\u002Fsc-for>\n         <div style=\"padding:8px 12px 5px;margin-top:3px;border-top:1px solid #f3efe6;font-size:11px;color:#a3a9b1;\">Every answer comes with a chart, the analysis and Finance, Ops, Sales, Procurement and QA views.<\u002Fdiv>\n       <\u002Fdiv>\n     <\u002Fsc-if>\n   <\u002Fform>\n   <div style=\"font-size:12px;color:#a3a9b1;margin-top:9px;\">Ask or speak a question. Answers are drawn live from your ops platform and name the agent that replied.<\u002Fdiv>\n\n   <!-- ORDER DAY: the decision -->\n   <sc-if value=\"{{doorOrder}}\" hint-placeholder-val=\"{{true}}\">\n     <div style=\"margin-top:24px;\">\n       <!-- TODAY layer: the operator's daily ritual, before you open and during the shift -->\n       <div style=\"border-left:3px solid #bf8a2e;padding:2px 0 2px 16px;margin-bottom:26px;\">\n         <div style=\"font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#a3956f;\">Today, before you open<\u002Fdiv>\n\n         <!-- STORE, outstanding -->\n         <sc-if value=\"{{todayStoreOpen}}\" hint-placeholder-val=\"{{true}}\">\n           <div style=\"display:flex;align-items:baseline;gap:10px;margin-top:11px;flex-wrap:wrap;\">\n             <span class=\"cs\" style=\"font-size:24px;font-weight:700;color:#15293f;letter-spacing:-.01em;\">{{today.done}} of {{today.total}}<\u002Fspan>\n             <span style=\"font-size:14px;color:#6f7d8c;\">opening tasks done, {{today.out}} outstanding<\u002Fspan>\n           <\u002Fdiv>\n           <div style=\"margin-top:10px;max-width:560px;height:7px;background:#efe7d4;border-radius:4px;overflow:hidden;\">\n             <div style=\"height:100%;width:{{today.pct}};background:#bf8a2e;border-radius:4px;\"><\u002Fdiv>\n           <\u002Fdiv>\n\n           <div style=\"margin-top:18px;font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#a3a9b1;\">Your next task<\u002Fdiv>\n           <div style=\"display:flex;align-items:flex-start;gap:10px;margin-top:8px;\">\n             <sc-if value=\"{{today.nextRisk}}\" hint-placeholder-val=\"{{false}}\">\n               <span aria-hidden=\"true\" style=\"flex:none;margin-top:2px;color:#b23a2e;\">{{alertIconRed}}<\u002Fspan>\n             <\u002Fsc-if>\n             <div style=\"min-width:0;flex:1;\">\n               <div style=\"font-size:15.5px;font-weight:600;color:#15293f;line-height:1.4;\">{{today.nextTitle}}<\u002Fdiv>\n               <div style=\"font-size:14px;color:#6f7d8c;line-height:1.5;margin-top:4px;max-width:520px;\">{{today.nextDetail}}<\u002Fdiv>\n             <\u002Fdiv>\n           <\u002Fdiv>\n           <div style=\"display:flex;gap:12px;align-items:center;margin-top:13px;flex-wrap:wrap;\">\n             <button type=\"button\" sc-camel-on-click=\"{{openTasks}}\" style=\"border:none;border-radius:9px;background:#15293f;color:#fff;font-size:13.5px;font-weight:600;padding:11px 17px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">Open task →<\u002Fbutton>\n           <\u002Fdiv>\n\n           <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:15px;flex-wrap:wrap;\">\n             <span style=\"font-size:12.5px;color:#9aa0a8;line-height:1.45;\">{{today.roleLine}}<\u002Fspan>\n             <button type=\"button\" sc-camel-on-click=\"{{openTasks}}\" style=\"flex:none;background:none;border:none;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;color:#6f7d8c;padding:4px 0;text-decoration:none;\" style-hover=\"text-decoration:underline;\">See all 50 tasks →<\u002Fbutton>\n           <\u002Fdiv>\n         <\u002Fsc-if>\n\n         <!-- STORE, all signed off -->\n         <sc-if value=\"{{todayStoreDone}}\" hint-placeholder-val=\"{{false}}\">\n           <div style=\"display:flex;align-items:center;gap:10px;margin-top:11px;\">\n             <span aria-hidden=\"true\" style=\"flex:none;display:inline-flex;color:#2f6b4f;\">{{checkIcon}}<\u002Fspan>\n             <span style=\"font-size:15.5px;font-weight:600;color:#2f6b4f;\">All opening tasks signed off, audit ready.<\u002Fspan>\n             <button type=\"button\" sc-camel-on-click=\"{{reopenToday}}\" style=\"background:none;border:none;cursor:pointer;font-family:inherit;font-size:12.5px;color:#9aa0a8;text-decoration:underline;padding:0;\">view<\u002Fbutton>\n           <\u002Fdiv>\n         <\u002Fsc-if>\n\n         <!-- REGIONAL / CORPORATE, aggregate -->\n         <sc-if value=\"{{today.multi}}\" hint-placeholder-val=\"{{false}}\">\n           <div style=\"display:flex;align-items:baseline;gap:10px;margin-top:11px;flex-wrap:wrap;\">\n             <span class=\"cs\" style=\"font-size:24px;font-weight:700;color:#15293f;letter-spacing:-.01em;\">{{today.aggSigned}} of {{today.aggTotal}}<\u002Fspan>\n             <span style=\"font-size:14px;color:#6f7d8c;\">outlets fully signed off this morning<\u002Fspan>\n           <\u002Fdiv>\n           <div style=\"display:flex;align-items:center;gap:10px;margin-top:12px;\">\n             <span aria-hidden=\"true\" style=\"flex:none;display:inline-flex;color:#b23a2e;\">{{alertIconRed}}<\u002Fspan>\n             <span style=\"font-size:14px;color:#3c4a5a;\">{{today.aggFlagged}} outlets flagged, opening checklist not yet complete.<\u002Fspan>\n           <\u002Fdiv>\n           <a href=\"https://niallfogarty.github.io/invrt-share/AI%20Agent%20Console%20(Standalone).html\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;margin-top:13px;font-size:12.5px;font-weight:600;color:#6f7d8c;text-decoration:none;\" style-hover=\"text-decoration:underline;\">See the flagged outlets →<\u002Fa>\n         <\u002Fsc-if>\n       <\u002Fdiv>\n\n       <!-- the one urgent thing: a headline block, not a box. it wins by size and air. -->\n       <sc-if value=\"{{showEmergencyHeadline}}\" hint-placeholder-val=\"{{false}}\">\n         <div style=\"margin:4px 0 30px;\">\n           <div style=\"display:flex;align-items:center;gap:8px;\">\n             <span aria-hidden=\"true\" style=\"display:inline-flex;color:#b23a2e;\">{{alertIconRed}}<\u002Fspan>\n             <span style=\"font-size:11.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#b23a2e;\">Needs you now<\u002Fspan>\n           <\u002Fdiv>\n           <div class=\"cs\" style=\"font-size:25px;font-weight:700;color:#15293f;margin-top:12px;line-height:1.25;letter-spacing:-.01em;max-width:600px;\">Walk in fridge read 6°C at 7:40am, above range.<\u002Fdiv>\n           <div style=\"font-size:15px;color:#6f7d8c;margin-top:9px;line-height:1.5;max-width:560px;\">Check the beef received this morning before service. It is on your record from the probe reading either way.<\u002Fdiv>\n           <button type=\"button\" sc-camel-on-click=\"{{resolveSafety}}\" style=\"margin-top:15px;border:none;border-radius:9px;background:#b23a2e;color:#fff;font-size:14px;font-weight:600;padding:12px 18px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#9c2f24;\">Log the check →<\u002Fbutton>\n         <\u002Fdiv>\n       <\u002Fsc-if>\n\n       <!-- reinforcement: a quiet line, no box -->\n       <sc-if value=\"{{hasWin}}\" hint-placeholder-val=\"{{false}}\">\n         <div style=\"display:flex;align-items:flex-start;gap:10px;margin:0 0 24px;\">\n           <span aria-hidden=\"true\" style=\"flex:none;margin-top:1px;color:#2f6b4f;\">{{checkIcon}}<\u002Fspan>\n           <div style=\"min-width:0;flex:1;\">\n             <span style=\"font-size:14px;color:#3c4a5a;line-height:1.5;\">{{winMsg}}<\u002Fspan>\n             <span style=\"font-size:12px;color:#a3a9b1;\"> · illustrative<\u002Fspan>\n           <\u002Fdiv>\n           <button type=\"button\" sc-camel-on-click=\"{{dismissWin}}\" aria-label=\"Dismiss\" style=\"flex:none;background:none;border:none;cursor:pointer;font-family:inherit;font-size:16px;color:#c2b7a3;line-height:1;padding:2px;\">×<\u002Fbutton>\n         <\u002Fdiv>\n       <\u002Fsc-if>\n\n       <div style=\"font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:#a3a9b1;\">This week, in priority order<\u002Fdiv>\n\n       <!-- board: a flat list. hairlines, not cards. -->\n       <div style=\"margin-top:8px;border-top:1px solid #ebe6da;\">\n         <sc-for list=\"{{activeCats}}\" as=\"c\" hint-placeholder-count=\"4\">\n           <div style=\"border-bottom:1px solid #ebe6da;\">\n             <button type=\"button\" sc-camel-on-click=\"{{toggleCat}}\" data-cat=\"{{c.id}}\" aria-expanded=\"{{c.open}}\" style=\"width:100%;text-align:left;background:none;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:16px;padding:18px 4px;\" style-hover=\"background:#faf8f3;\">\n               <span style=\"flex:1;min-width:0;\">\n                 <span style=\"display:block;font-size:15.5px;font-weight:600;color:#15293f;line-height:1.35;\">{{c.status}}<\u002Fspan>\n                 <span style=\"display:block;font-size:12.5px;color:#9aa0a8;margin-top:3px;\">{{c.name}}<\u002Fspan>\n               <\u002Fspan>\n               <span style=\"flex:none;font-size:12.5px;color:#9aa0a8;\">{{c.timeframe}}<\u002Fspan>\n               <span aria-hidden=\"true\" style=\"flex:none;display:inline-flex;color:#c8c2b4;font-size:11px;transform:{{c.chevRot}};transition:transform .18s;\">▾<\u002Fspan>\n             <\u002Fbutton>\n             <sc-if value=\"{{c.open}}\" hint-placeholder-val=\"{{false}}\">\n               <div style=\"padding:2px 4px 24px;\">\n\n                 <!-- food safety detail -->\n                 <sc-if value=\"{{c.isOpenSafety}}\" hint-placeholder-val=\"{{false}}\">\n                   <div style=\"margin-top:14px;border-left:3px solid #b23a2e;background:#fdf3f2;border-radius:0 9px 9px 0;padding:13px 16px;\">\n                     <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#b23a2e;\">Temperature log · walk in<\u002Fdiv>\n                     <div style=\"font-size:14px;color:#3c4a5a;margin-top:6px;line-height:1.55;\">Check the beef received this morning before service. Logged from the probe reading, so it is on your record either way. Recorded at 7:40am, threshold 5°C.<\u002Fdiv>\n                     <button type=\"button\" sc-camel-on-click=\"{{resolveSafety}}\" style=\"margin-top:12px;border:none;border-radius:8px;background:#15293f;color:#fff;font-size:13.5px;font-weight:600;padding:11px 16px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">Log the check →<\u002Fbutton>\n                   <\u002Fdiv>\n                 <\u002Fsc-if>\n\n                 <sc-if value=\"{{c.isOpenStock}}\" hint-placeholder-val=\"{{false}}\">\n                   <div aria-label=\"Will I run short\" style=\"margin-top:14px;background:#fff;border:1px solid #e6e0d4;border-left:4px solid #bf8a2e;border-radius:9px;padding:18px 18px;\">\n                     <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;\">\n                       <div class=\"cs\" style=\"font-size:17px;font-weight:700;color:#15293f;\">Will I run short?<\u002Fdiv>\n                       <span style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#2f6b4f;background:#eaf1ed;border:1px solid #cfe1d6;border-radius:5px;padding:3px 8px;\">Live data<\u002Fspan>\n                     <\u002Fdiv>\n                     <div role=\"status\" style=\"display:flex;align-items:flex-start;gap:10px;margin-top:13px;background:#faf2df;border:1px solid #ecdcb6;border-left:3px solid #bf8a2e;border-radius:5px;padding:11px 14px;\">\n                       <span aria-hidden=\"true\" style=\"flex:none;margin-top:1px;color:#bf8a2e;\">{{alertIcon}}<\u002Fspan>\n                       <div style=\"font-size:14px;line-height:1.5;color:#15293f;\">Short 90 lb mozzarella for Friday. Order by Wed noon.<\u002Fdiv>\n                     <\u002Fdiv>\n                     <svg sc-camel-view-box=\"0 0 520 224\" width=\"100%\" style=\"display:block;margin-top:16px;overflow:visible;\" role=\"img\" aria-label=\"Projected mozzarella stock from Wednesday to Monday. The recommended order ends with about six pounds to spare. Doing nothing stocks out on Saturday. Over ordering leaves about thirty five pounds that spoil.\">\n                       <rect x=\"212\" y=\"20\" width=\"172\" height=\"160\" fill=\"#f6edda\"><\u002Frect>\n                       <text x=\"298\" y=\"14\" text-anchor=\"middle\" font-size=\"10\" letter-spacing=\"1.2\" fill=\"#a08a5c\" font-family=\"Georgia,serif\">PROMOTION<\u002Ftext>\n                       <line x1=\"40\" y1=\"180\" x2=\"470\" y2=\"180\" stroke=\"#e6e0d4\" stroke-width=\"1\"><\u002Fline>\n                       <line x1=\"40\" y1=\"18\" x2=\"40\" y2=\"180\" stroke=\"#bf8a2e\" stroke-width=\"1.4\" stroke-dasharray=\"5 4\"><\u002Fline>\n                       <text x=\"46\" y=\"28\" font-size=\"9.5\" letter-spacing=\".5\" font-weight=\"700\" fill=\"#bf8a2e\">ORDER BY WED<\u002Ftext>\n                       <polyline points=\"40,134 126,136 212,140 298,180 384,180 470,180\" fill=\"none\" stroke=\"#aeb4bb\" stroke-width=\"2\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n                       <polyline points=\"40,134 126,30 212,59 298,111 384,140 470,140\" fill=\"none\" stroke=\"#cda45a\" stroke-width=\"2\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n                       <polyline points=\"40,134 126,36 212,70 298,111 384,173 470,173\" fill=\"none\" stroke=\"#2f6b4f\" stroke-width=\"3.4\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n                       <circle cx=\"40\" cy=\"134\" r=\"3.6\" fill=\"#15293f\"><\u002Fcircle>\n                       <circle cx=\"298\" cy=\"180\" r=\"4.6\" fill=\"#b23a2e\"><\u002Fcircle>\n                       <text x=\"298\" y=\"170\" text-anchor=\"middle\" font-size=\"10.5\" font-weight=\"600\" fill=\"#b23a2e\">stock out Sat<\u002Ftext>\n                       <circle cx=\"470\" cy=\"140\" r=\"4.2\" fill=\"#bf8a2e\"><\u002Fcircle>\n                       <circle cx=\"470\" cy=\"173\" r=\"3.6\" fill=\"#2f6b4f\"><\u002Fcircle>\n                       <text x=\"40\" y=\"200\" text-anchor=\"middle\" font-size=\"11\" fill=\"#6f7d8c\">Wed<\u002Ftext>\n                       <text x=\"126\" y=\"200\" text-anchor=\"middle\" font-size=\"11\" fill=\"#6f7d8c\">Thu<\u002Ftext>\n                       <text x=\"212\" y=\"200\" text-anchor=\"middle\" font-size=\"11\" fill=\"#6f7d8c\">Fri<\u002Ftext>\n                       <text x=\"298\" y=\"200\" text-anchor=\"middle\" font-size=\"11\" fill=\"#6f7d8c\">Sat<\u002Ftext>\n                       <text x=\"384\" y=\"200\" text-anchor=\"middle\" font-size=\"11\" fill=\"#6f7d8c\">Sun<\u002Ftext>\n                       <text x=\"470\" y=\"200\" text-anchor=\"middle\" font-size=\"11\" fill=\"#6f7d8c\">Mon<\u002Ftext>\n                     <\u002Fsvg>\n                     <div style=\"display:flex;flex-wrap:wrap;gap:10px 18px;margin-top:10px;\">\n                       <span style=\"display:flex;align-items:center;gap:7px;font-size:12.5px;color:#15293f;\"><span aria-hidden=\"true\" style=\"width:20px;height:0;border-top:3.4px solid #2f6b4f;\"><\u002Fspan>Order 90 lb <span style=\"color:#8a94a0;\">6 lb to spare<\u002Fspan><\u002Fspan>\n                       <span style=\"display:flex;align-items:center;gap:7px;font-size:12.5px;color:#15293f;\"><span aria-hidden=\"true\" style=\"width:20px;height:0;border-top:2px solid #aeb4bb;\"><\u002Fspan>Do nothing <span style=\"color:#8a94a0;\">out Sat<\u002Fspan><\u002Fspan>\n                       <span style=\"display:flex;align-items:center;gap:7px;font-size:12.5px;color:#15293f;\"><span aria-hidden=\"true\" style=\"width:20px;height:0;border-top:2px solid #cda45a;\"><\u002Fspan>Over order <span style=\"color:#8a94a0;\">35 lb spoils<\u002Fspan><\u002Fspan>\n                     <\u002Fdiv>\n                     <div style=\"margin-top:14px;padding-top:14px;border-top:1px solid #efe9dd;\">\n                       <div style=\"font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#a3956f;margin-bottom:9px;\">How we got here<\u002Fdiv>\n                       <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:7px;\">\n                         <sc-for list=\"{{trace}}\" as=\"t\" hint-placeholder-count=\"7\">\n                           <div style=\"display:flex;align-items:center;gap:7px;\">\n                             <div style=\"background:#f7f4ee;border:1px solid #ece6d9;border-radius:7px;padding:6px 10px;\">\n                               <div style=\"font-size:12.5px;font-weight:600;color:#15293f;line-height:1.1;\">{{t.v}}<\u002Fdiv>\n                               <div style=\"font-size:9.5px;color:#a3956f;margin-top:1px;\">{{t.s}}<\u002Fdiv>\n                             <\u002Fdiv>\n                             <span aria-hidden=\"true\" style=\"color:#cdc4b2;font-size:13px;\">{{t.arrow}}<\u002Fspan>\n                           <\u002Fdiv>\n                         <\u002Fsc-for>\n                       <\u002Fdiv>\n                     <\u002Fdiv>\n                     <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px;padding-top:14px;border-top:1px solid #efe9dd;flex-wrap:wrap;\">\n                       <div style=\"font-size:13.5px;color:#3c4a5a;max-width:330px;\">Order 90 lb mozzarella by Wed noon. <span style=\"font-weight:600;color:#2f6b4f;\">Protects about $3,100 of pizza gross profit.<\u002Fspan><\u002Fdiv>\n                       <div style=\"display:flex;align-items:center;gap:12px;\">\n                         <a href=\"The Collision.dc.html\" style=\"font-size:13px;font-weight:600;color:#6f7d8c;text-decoration:none;\" style-hover=\"text-decoration:underline;\">Full breakdown →<\u002Fa>\n                         <sc-if value=\"{{orderIdle}}\" hint-placeholder-val=\"{{true}}\">\n                           <button type=\"button\" sc-camel-on-click=\"{{placeOrder}}\" style=\"border:none;border-radius:7px;background:#15293f;color:#fff;font-size:13.5px;font-weight:600;padding:10px 16px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">Place this order<\u002Fbutton>\n                         <\u002Fsc-if>\n                         <sc-if value=\"{{orderPlaced}}\" hint-placeholder-val=\"{{false}}\">\n                           <span style=\"display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#2f6b4f;\">{{checkIcon}} Order placed <button type=\"button\" sc-camel-on-click=\"{{undoOrder}}\" style=\"margin-left:4px;font-size:12.5px;color:#6f7d8c;background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;\">Undo<\u002Fbutton><\u002Fspan>\n                         <\u002Fsc-if>\n                       <\u002Fdiv>\n                     <\u002Fdiv>\n                   <\u002Fdiv>\n                 <\u002Fsc-if>\n\n                 <sc-for list=\"{{c.catLinks}}\" as=\"l\" hint-placeholder-count=\"1\">\n             <div style=\"padding-top:14px;min-width:0;\">\n               <div style=\"font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#a3956f;\">{{l.name}}<\u002Fdiv>\n               <sc-if value=\"{{l.notBottom}}\" hint-placeholder-val=\"{{true}}\">\n               <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-top:4px;\">\n                 <div style=\"flex:1;min-width:200px;\">\n                   <button type=\"button\" sc-camel-on-click=\"{{toggleFig}}\" data-fig=\"{{l.id}}\" aria-expanded=\"{{l.open}}\" style=\"background:none;border:none;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:10px;padding:5px 0 0;margin:0;\">\n                     <span class=\"cs\" style=\"font-size:27px;font-weight:700;color:{{l.valColor}};border-bottom:{{l.valBorder}};padding-bottom:2px;line-height:1;\">{{l.value}}<\u002Fspan>\n                     <span aria-hidden=\"true\" style=\"display:inline-flex;color:#c2b7a3;font-size:11px;transform:{{l.chevronRot}};transition:transform .18s;\">▾<\u002Fspan>\n                   <\u002Fbutton>\n                   <div style=\"font-size:14.5px;color:#3c4a5a;margin-top:9px;line-height:1.5;max-width:420px;\">{{l.line}}<\u002Fdiv>\n                   <sc-if value=\"{{l.isFootfall}}\" hint-placeholder-val=\"{{false}}\">\n                     <div style=\"margin-top:14px;\">{{l.footfallChartEl}}<\u002Fdiv>\n                     <div style=\"font-size:13px;color:#6f7d8c;margin-top:11px;line-height:1.5;max-width:440px;\">This week runs above last week and last year all week. Dry weather adds about 6% across the weekend; the Saturday concert adds about 9% on the night.<\u002Fdiv>\n                     <div style=\"margin-top:12px;display:flex;flex-direction:column;gap:7px;max-width:440px;\">\n                       <div style=\"font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#a3956f;\">Inputs to this forecast<\u002Fdiv>\n                       <div style=\"display:flex;align-items:center;gap:9px;background:#faf8f3;border:1px solid #eee9dd;border-radius:9px;padding:9px 12px;\">\n                         <span aria-hidden=\"true\" style=\"flex:none;color:#bf8a2e;display:inline-flex;\">{{sunIcon}}<\u002Fspan>\n                         <div style=\"min-width:0;flex:1;\">\n                           <span style=\"font-size:13px;color:#15293f;\">Weather: dry and warm, about 21°C, Friday to Sunday<\u002Fspan>\n                           <span style=\"font-size:12.5px;color:#2f6b4f;font-weight:600;\"> · lifts covers about 6%<\u002Fspan>\n                         <\u002Fdiv>\n                         <span style=\"flex:none;font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#bf8a2e;border:1px solid #ecdcb8;border-radius:4px;padding:2px 6px;\">Illustrative<\u002Fspan>\n                       <\u002Fdiv>\n                       <div style=\"display:flex;align-items:center;gap:9px;background:#faf8f3;border:1px solid #eee9dd;border-radius:9px;padding:9px 12px;\">\n                         <span aria-hidden=\"true\" style=\"flex:none;color:#6f7d8c;display:inline-flex;\">{{calIcon}}<\u002Fspan>\n                         <div style=\"min-width:0;flex:1;\">\n                           <span style=\"font-size:13px;color:#15293f;\">Event: arena concert, Saturday 8pm<\u002Fspan>\n                           <span style=\"font-size:12.5px;color:#2f6b4f;font-weight:600;\"> · lifts covers about 9%<\u002Fspan>\n                         <\u002Fdiv>\n                         <span style=\"flex:none;font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#2f6b4f;background:#eaf1ed;border:1px solid #cfe1d6;border-radius:4px;padding:2px 6px;\">Live<\u002Fspan>\n                       <\u002Fdiv>\n                     <\u002Fdiv>\n                   <\u002Fsc-if>\n                   <sc-if value=\"{{l.hasAddEvent}}\" hint-placeholder-val=\"{{false}}\">\n                     <sc-if value=\"{{eventAdded}}\" hint-placeholder-val=\"{{false}}\">\n                       <div style=\"display:inline-flex;align-items:center;gap:7px;margin-top:12px;font-size:12.5px;font-weight:600;color:#2f6b4f;\">{{checkIcon}} Added to your forecast<\u002Fdiv>\n                     <\u002Fsc-if>\n                     <sc-if value=\"{{eventAddedNot}}\" hint-placeholder-val=\"{{true}}\">\n                       <button type=\"button\" sc-camel-on-click=\"{{addLocalEvent}}\" style=\"display:inline-flex;align-items:center;gap:7px;margin-top:12px;background:#fff;border:1px solid #e0d8c9;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;color:#6f7d8c;padding:8px 13px;\" style-hover=\"background:#f7f4ee;border-color:#cdc4b2;\"><span aria-hidden=\"true\" style=\"display:inline-flex;\">{{plusIcon}}<\u002Fspan> Add a local event<\u002Fbutton>\n                       <div style=\"font-size:11.5px;color:#a3a9b1;margin-top:6px;line-height:1.45;max-width:380px;\">Something no public feed knows, like a match in the field next door. It sharpens the forecast.<\u002Fdiv>\n                     <\u002Fsc-if>\n                   <\u002Fsc-if>\n                 <\u002Fdiv>\n                 <sc-if value=\"{{l.notFootfall}}\" hint-placeholder-val=\"{{true}}\">\n                 <button type=\"button\" sc-camel-on-click=\"{{toggleFig}}\" data-fig=\"{{l.id}}\" aria-label=\"Chart, tap for source\" style=\"background:none;border:none;cursor:pointer;padding:6px 0 0;margin:0;flex:none;width:248px;max-width:100%;\">{{l.chartEl}}<\u002Fbutton>\n                 <\u002Fsc-if>\n               <\u002Fdiv>\n               <\u002Fsc-if>\n\n               <!-- bottom row: two labelled variants side by side (testing language) -->\n               <sc-if value=\"{{l.isBottom}}\" hint-placeholder-val=\"{{false}}\">\n                 <!-- primary framing: gross profit per ticket to target -->\n                 <div style=\"display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-top:6px;\">\n                   <span class=\"cs\" style=\"font-size:30px;font-weight:700;color:#15293f;border-bottom:2px solid #bf8a2e;padding-bottom:2px;line-height:1;\">$13.40<\u002Fspan>\n                   <span style=\"font-size:13px;color:#6f7d8c;padding-bottom:2px;\">gross profit per ticket, against a $14.20 target<\u002Fspan>\n                 <\u002Fdiv>\n                 <div style=\"margin-top:14px;max-width:560px;\">\n                   <div style=\"position:relative;height:12px;background:#f1ece1;border-radius:6px;\">\n                     <div style=\"position:absolute;left:0;top:0;bottom:0;width:94.4%;background:#15293f;border-radius:6px;\"><\u002Fdiv>\n                     <div style=\"position:absolute;left:94.4%;top:-3px;bottom:-3px;width:2px;background:#bf8a2e;\"><\u002Fdiv>\n                   <\u002Fdiv>\n                   <div style=\"display:flex;justify-content:space-between;margin-top:6px;\">\n                     <span style=\"font-size:11.5px;color:#6f7d8c;\">Now $13.40<\u002Fspan>\n                     <span style=\"font-size:11.5px;font-weight:600;color:#bf8a2e;\">Target $14.20<\u002Fspan>\n                   <\u002Fdiv>\n                 <\u002Fdiv>\n                 <div style=\"font-size:14.5px;color:#3c4a5a;margin-top:14px;line-height:1.5;max-width:560px;\">{{l.line}}<\u002Fdiv>\n                 <!-- alternate framing: prime cost, the two dials the operator already turns -->\n                 <div style=\"margin-top:16px;padding-top:14px;border-top:1px solid #efe9dd;max-width:560px;\">\n                   <div style=\"font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#a3956f;\">Same week, read as prime cost<\u002Fdiv>\n                   <div style=\"display:grid;grid-template-columns:54px 1fr 48px;gap:11px;align-items:center;margin-top:11px;\">\n                     <span style=\"font-size:12.5px;color:#3c4a5a;\">Labour<\u002Fspan>\n                     <div style=\"position:relative;height:9px;background:#f1ece1;border-radius:5px;\">\n                       <div style=\"position:absolute;left:0;top:0;bottom:0;width:79%;background:#bf8a2e;border-radius:5px;\"><\u002Fdiv>\n                       <div style=\"position:absolute;left:77%;top:-2px;bottom:-2px;width:1.5px;background:#15293f;\"><\u002Fdiv>\n                     <\u002Fdiv>\n                     <span class=\"cs\" style=\"font-size:13px;font-weight:700;color:#b6831f;text-align:right;\">27.8%<\u002Fspan>\n                   <\u002Fdiv>\n                   <div style=\"display:grid;grid-template-columns:54px 1fr 48px;gap:11px;align-items:center;margin-top:9px;\">\n                     <span style=\"font-size:12.5px;color:#3c4a5a;\">Food<\u002Fspan>\n                     <div style=\"position:relative;height:9px;background:#f1ece1;border-radius:5px;\">\n                       <div style=\"position:absolute;left:0;top:0;bottom:0;width:92%;background:#bf8a2e;border-radius:5px;\"><\u002Fdiv>\n                       <div style=\"position:absolute;left:86%;top:-2px;bottom:-2px;width:1.5px;background:#15293f;\"><\u002Fdiv>\n                     <\u002Fdiv>\n                     <span class=\"cs\" style=\"font-size:13px;font-weight:700;color:#b6831f;text-align:right;\">32.1%<\u002Fspan>\n                   <\u002Fdiv>\n                   <div style=\"font-size:11px;color:#a3a9b1;margin-top:8px;\">Bars are this week, the mark is target. Both run a little over.<\u002Fdiv>\n                 <\u002Fdiv>\n               <\u002Fsc-if>\n\n               <sc-if value=\"{{l.open}}\" hint-placeholder-val=\"{{false}}\">\n                 <div style=\"margin-top:11px;background:#faf8f3;border:1px solid #eee9dd;border-radius:8px;padding:11px 13px;\">\n                   <div style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3956f;margin-bottom:5px;\">{{l.statusLabel}}<\u002Fdiv>\n                   <sc-for list=\"{{l.source}}\" as=\"ln\" hint-placeholder-count=\"2\">\n                     <div style=\"font-size:13.5px;color:#5a6675;line-height:1.5;margin-top:3px;\">{{ln.t}}<\u002Fdiv>\n                   <\u002Fsc-for>\n                 <\u002Fdiv>\n               <\u002Fsc-if>\n\n               <!-- cost of inaction (terracotta) -->\n               <sc-if value=\"{{l.hasInaction}}\" hint-placeholder-val=\"{{false}}\">\n                 <div style=\"margin-top:14px;border-left:3px solid #b23a2e;background:#fdf3f2;padding:10px 14px;border-radius:0 8px 8px 0;\">\n                   <div style=\"font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#b23a2e;\">If you do nothing<\u002Fdiv>\n                   <div style=\"font-size:13.5px;color:#3c4a5a;margin-top:4px;line-height:1.5;\">{{l.inaction}}<\u002Fdiv>\n                 <\u002Fdiv>\n               <\u002Fsc-if>\n\n               <!-- the saving side (green) -->\n               <sc-if value=\"{{l.hasSaving}}\" hint-placeholder-val=\"{{false}}\">\n                 <div style=\"margin-top:10px;border-left:3px solid #2f6b4f;background:#f3f8f5;padding:10px 14px;border-radius:0 8px 8px 0;\">\n                   <div style=\"font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#2f6b4f;\">The saving<\u002Fdiv>\n                   <div style=\"font-size:13.5px;color:#3c4a5a;margin-top:4px;line-height:1.5;\">{{l.saving}}<\u002Fdiv>\n                 <\u002Fdiv>\n               <\u002Fsc-if>\n\n               <!-- reorder: seldom ordered catch + reconciliation preview -->\n               <sc-if value=\"{{l.hasSeldom}}\" hint-placeholder-val=\"{{false}}\">\n                 <div style=\"margin-top:11px;display:flex;align-items:flex-start;gap:9px;background:#faf8f3;border:1px solid #eee9dd;border-radius:8px;padding:10px 13px;\">\n                   <span aria-hidden=\"true\" style=\"flex:none;margin-top:1px;color:#bf8a2e;\">{{historyIcon}}<\u002Fspan>\n                   <div style=\"font-size:13px;color:#3c4a5a;line-height:1.5;\">{{l.seldom}}<\u002Fdiv>\n                 <\u002Fdiv>\n               <\u002Fsc-if>\n               <sc-if value=\"{{l.hasRecon}}\" hint-placeholder-val=\"{{false}}\">\n               <\u002Fsc-if>\n\n               <!-- staffing action, gated by scheduling permission -->\n               <sc-if value=\"{{l.isStaff}}\" hint-placeholder-val=\"{{false}}\">\n                 <div style=\"margin-top:14px;\">\n                   <sc-if value=\"{{l.permEdit}}\" hint-placeholder-val=\"{{true}}\">\n                     <sc-if value=\"{{l.staffIdle}}\" hint-placeholder-val=\"{{true}}\">\n                       <button type=\"button\" sc-camel-on-click=\"{{proposeStaff}}\" style=\"border:none;border-radius:8px;background:#15293f;color:#fff;font-size:13.5px;font-weight:600;padding:11px 16px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">Propose the roster fix<\u002Fbutton>\n                     <\u002Fsc-if>\n                     <sc-if value=\"{{l.staffProposed}}\" hint-placeholder-val=\"{{false}}\">\n                       <div style=\"background:#f4f8f5;border:1px solid #d6e6dc;border-radius:9px;padding:13px 15px;\">\n                         <div style=\"font-size:13.5px;color:#2c4a39;line-height:1.5;\">Add one Friday, two Saturday, drop one Sunday. Labour holds near 27% of sales.<\u002Fdiv>\n                         <div style=\"display:flex;gap:10px;margin-top:11px;flex-wrap:wrap;\">\n                           <button type=\"button\" sc-camel-on-click=\"{{confirmStaff}}\" style=\"border:none;border-radius:8px;background:#15293f;color:#fff;font-size:13px;font-weight:600;padding:9px 15px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">Confirm<\u002Fbutton>\n                           <button type=\"button\" sc-camel-on-click=\"{{cancelStaff}}\" style=\"border:1px solid #cdbf9f;background:#fff;border-radius:8px;color:#6f7d8c;font-size:13px;font-weight:600;padding:9px 15px;cursor:pointer;font-family:inherit;\">Cancel<\u002Fbutton>\n                         <\u002Fdiv>\n                       <\u002Fdiv>\n                     <\u002Fsc-if>\n                     <sc-if value=\"{{l.staffApplied}}\" hint-placeholder-val=\"{{false}}\">\n                       <span style=\"display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:#2f6b4f;\">{{checkIcon}} Roster updated <button type=\"button\" sc-camel-on-click=\"{{cancelStaff}}\" style=\"margin-left:4px;font-size:12.5px;color:#6f7d8c;background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;\">Undo<\u002Fbutton><\u002Fspan>\n                     <\u002Fsc-if>\n                   <\u002Fsc-if>\n                   <sc-if value=\"{{l.permCentral}}\" hint-placeholder-val=\"{{false}}\">\n                     <sc-if value=\"{{l.notifyIdle}}\" hint-placeholder-val=\"{{true}}\">\n                       <button type=\"button\" sc-camel-on-click=\"{{notifyScheduler}}\" style=\"border:none;border-radius:8px;background:#15293f;color:#fff;font-size:13.5px;font-weight:600;padding:11px 16px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">Notify the scheduler<\u002Fbutton>\n                       <div style=\"font-size:11.5px;color:#a3a9b1;margin-top:7px;\">Scheduling is centralised, so the store flags it and head office makes the change.<\u002Fdiv>\n                     <\u002Fsc-if>\n                     <sc-if value=\"{{l.notifySent}}\" hint-placeholder-val=\"{{false}}\">\n                       <span style=\"display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:#2f6b4f;\">{{checkIcon}} Scheduler notified <button type=\"button\" sc-camel-on-click=\"{{undoNotify}}\" style=\"margin-left:4px;font-size:12.5px;color:#6f7d8c;background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;\">Undo<\u002Fbutton><\u002Fspan>\n                     <\u002Fsc-if>\n                   <\u002Fsc-if>\n                   <div style=\"display:inline-flex;align-items:center;gap:6px;margin-left:0;margin-top:11px;background:#f1ece1;border-radius:8px;padding:3px;\">\n                     <sc-for list=\"{{permTabs}}\" as=\"pt\" hint-placeholder-count=\"2\">\n                       <button type=\"button\" sc-camel-on-click=\"{{setSchedPerm}}\" data-perm=\"{{pt.key}}\" aria-pressed=\"{{pt.on}}\" style=\"border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;padding:5px 10px;border-radius:6px;background:{{pt.bg}};color:{{pt.fg}};\">{{pt.label}}<\u002Fbutton>\n                     <\u002Fsc-for>\n                   <\u002Fdiv>\n                   <!-- rostering pathway entry, mirrors the stock count CTA -->\n                   <div style=\"margin-top:14px;background:#faf8f3;border:1px solid #eee9dd;border-radius:10px;padding:14px 16px;\">\n                     <div style=\"display:flex;align-items:center;gap:8px;\">\n                       <span style=\"font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#5a6675;background:#fff;border:1px solid #ddd5c6;border-radius:4px;padding:3px 7px;\">AI scheduling · machine learning<\u002Fspan>\n                       <span style=\"font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#bf8a2e;border:1px solid #ecdcb8;border-radius:4px;padding:2px 7px;\">Roadmap<\u002Fspan>\n                     <\u002Fdiv>\n                     <div style=\"font-size:13px;color:#3c4a5a;line-height:1.5;margin-top:9px;max-width:440px;\">The same ML demand forecast that builds your order builds your roster. See this week’s copied schedule, the conflicts it hides, and the forecast-driven fix. Nothing publishes without your confirmation.<\u002Fdiv>\n                     <button type=\"button\" sc-camel-on-click=\"{{openPath}}\" data-track=\"sched\" style=\"margin-top:12px;display:inline-flex;align-items:center;gap:8px;border:none;border-radius:8px;background:#15293f;color:#fff;font-size:13.5px;font-weight:600;padding:11px 18px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\"><span aria-hidden=\"true\" style=\"display:inline-flex;\">{{layersIconWhite}}<\u002Fspan> Build the schedule →<\u002Fbutton>\n                   <\u002Fdiv>\n                 <\u002Fdiv>\n               <\u002Fsc-if>\n\n               <!-- gp action: upsell -->\n               <sc-if value=\"{{l.isUpsell}}\" hint-placeholder-val=\"{{false}}\">\n                 <div style=\"margin-top:14px;\">\n                   <sc-if value=\"{{l.upsellIdle}}\" hint-placeholder-val=\"{{true}}\">\n                     <button type=\"button\" sc-camel-on-click=\"{{applyUpsell}}\" style=\"border:none;border-radius:8px;background:#15293f;color:#fff;font-size:13.5px;font-weight:600;padding:11px 16px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">Push the side of chips, +$640 a week<\u002Fbutton>\n                   <\u002Fsc-if>\n                   <sc-if value=\"{{l.upsellApplied}}\" hint-placeholder-val=\"{{false}}\">\n                     <span style=\"display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:#2f6b4f;\">{{checkIcon}} Briefed to the floor <button type=\"button\" sc-camel-on-click=\"{{undoUpsell}}\" style=\"margin-left:4px;font-size:12.5px;color:#6f7d8c;background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;\">Undo<\u002Fbutton><\u002Fspan>\n                   <\u002Fsc-if>\n                 <\u002Fdiv>\n               <\u002Fsc-if>\n\n               <!-- count action: leads to the guided ordering pathway -->\n               <sc-if value=\"{{l.isCount}}\" hint-placeholder-val=\"{{false}}\">\n                 <div style=\"margin-top:14px;background:#faf8f3;border:1px solid #eee9dd;border-radius:10px;padding:14px 16px;\">\n                   <div style=\"display:flex;align-items:center;gap:8px;\">\n                     <span style=\"font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#5a6675;background:#fff;border:1px solid #ddd5c6;border-radius:4px;padding:3px 7px;\">AI ordering · machine learning<\u002Fspan>\n                   <\u002Fdiv>\n                   <div style=\"font-size:13px;color:#3c4a5a;line-height:1.5;margin-top:9px;max-width:440px;\">Tonight’s order forecast updates when your count is submitted. Machine learning on sales and stock history, not a chatbot. Your confirmation is always required before any order is placed.<\u002Fdiv>\n                   <button type=\"button\" sc-camel-on-click=\"{{openPath}}\" data-track=\"order\" style=\"margin-top:12px;display:inline-flex;align-items:center;gap:8px;border:none;border-radius:8px;background:#15293f;color:#fff;font-size:13.5px;font-weight:600;padding:11px 18px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\"><span aria-hidden=\"true\" style=\"display:inline-flex;\">{{micIconWhite}}<\u002Fspan> Start stock count →<\u002Fbutton>\n                 <\u002Fdiv>\n               <\u002Fsc-if>\n\n               <!-- reorder action -->\n               <sc-if value=\"{{l.isReorder}}\" hint-placeholder-val=\"{{false}}\">\n                 <div style=\"margin-top:14px;\">\n                   <sc-if value=\"{{l.reorderIdle}}\" hint-placeholder-val=\"{{true}}\">\n                     <button type=\"button\" sc-camel-on-click=\"{{applyReorder}}\" style=\"border:none;border-radius:8px;background:#15293f;color:#fff;font-size:13.5px;font-weight:600;padding:11px 16px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">Add the reorder, $527<\u002Fbutton>\n                   <\u002Fsc-if>\n                   <sc-if value=\"{{l.reorderApplied}}\" hint-placeholder-val=\"{{false}}\">\n                     <span style=\"display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600;color:#2f6b4f;\">{{checkIcon}} Order drafted for Wednesday <button type=\"button\" sc-camel-on-click=\"{{undoReorder}}\" style=\"margin-left:4px;font-size:12.5px;color:#6f7d8c;background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline;\">Undo<\u002Fbutton><\u002Fspan>\n                   <\u002Fsc-if>\n                 <\u002Fdiv>\n                 <!-- order management: what is already in flight -->\n                 <sc-if value=\"{{l.hasOrders}}\" hint-placeholder-val=\"{{false}}\">\n                   <div style=\"margin-top:13px;border:1px solid #eee9dd;border-radius:9px;padding:11px 13px;\">\n                     <div style=\"font-size:10.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#a3956f;margin-bottom:7px;\">Already on the way<\u002Fdiv>\n                     <sc-for list=\"{{l.orders}}\" as=\"o\" hint-placeholder-count=\"2\">\n                       <div style=\"display:flex;align-items:flex-start;gap:9px;padding:4px 0;\">\n                         <span aria-hidden=\"true\" style=\"flex:none;width:8px;height:8px;border-radius:50%;background:{{o.dot}};margin-top:5px;\"><\u002Fspan>\n                         <div style=\"min-width:0;\">\n                           <span style=\"font-size:13px;color:#15293f;\">{{o.label}}<\u002Fspan>\n                           <span style=\"font-size:12.5px;color:#8a94a0;\"> · {{o.status}}<\u002Fspan>\n                         <\u002Fdiv>\n                       <\u002Fdiv>\n                     <\u002Fsc-for>\n                   <\u002Fdiv>\n                 <\u002Fsc-if>\n               <\u002Fsc-if>\n             <\u002Fdiv>\n                 <\u002Fsc-for>\n                 <!-- explore further, scoped to this category, opens the panel with context set cing:.09em;text-transform:uppercase;color:#a3a9b1;\">Done today<\u002Fdiv>\n           <div style=\"margin-top:8px;border-top:1px solid #ebe6da;\">\n             <sc-for list=\"{{doneCats}}\" as=\"c\" hint-placeholder-count=\"1\">\n               <div style=\"border-bottom:1px solid #ebe6da;\">\n                 <button type=\"button\" sc-camel-on-click=\"{{toggleCat}}\" data-cat=\"{{c.id}}\" aria-expanded=\"{{c.open}}\" style=\"width:100%;text-align:left;background:none;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:13px;padding:14px 4px;\" style-hover=\"background:#faf8f3;\">\n                   <span aria-hidden=\"true\" style=\"flex:none;display:inline-flex;color:#2f6b4f;\">{{checkIcon}}<\u002Fspan>\n                   <span style=\"flex:1;min-width:0;\">\n                     <span style=\"display:block;font-size:14px;font-weight:600;color:#6f7d8c;line-height:1.35;\">{{c.status}}<\u002Fspan>\n                     <span style=\"display:block;font-size:12px;color:#b6bcc4;margin-top:2px;\">{{c.name}}<\u002Fspan>\n                   <\u002Fspan>\n                   <span style=\"flex:none;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#2f6b4f;\">Done<\u002Fspan>\n                   <span aria-hidden=\"true\" style=\"flex:none;display:inline-flex;color:#c8c2b4;font-size:11px;transform:{{c.chevRot}};transition:transform .18s;\">▾<\u002Fspan>\n                 <\u002Fbutton>\n                 <sc-if value=\"{{c.open}}\" hint-placeholder-val=\"{{false}}\">\n                   <div style=\"padding:2px 4px 22px;\">\n                     <div style=\"font-size:13px;color:#9aa0a8;line-height:1.5;\">This is handled for the week. Open it any time to review or change what you did.<\u002Fdiv>\n                     <button type=\"button\" sc-camel-on-click=\"{{actInsight}}\" data-q=\"{{c.agentQ}}\" style=\"margin-top:11px;display:inline-flex;align-items:center;gap:7px;background:none;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:#6f7d8c;padding:4px 0;\" style-hover=\"color:#2f6b4f;\">Review with the {{c.name}} agent →<\u002Fbutton>\n                   <\u002Fdiv>\n                 <\u002Fsc-if>\n               <\u002Fdiv>\n             <\u002Fsc-for>\n           <\u002Fdiv>\n         <\u002Fdiv>\n       <\u002Fsc-if>\n\n       <!-- per-customer configuration and negative filtering -->\n       <div style=\"margin-top:20px;display:flex;align-items:flex-start;gap:10px;\">\n         <span aria-hidden=\"true\" style=\"flex:none;margin-top:1px;color:#b6ad99;\">{{slidersIcon}}<\u002Fspan>\n         <div style=\"min-width:0;flex:1;font-size:12px;color:#a3a9b1;line-height:1.5;\">Configured for Outlet 117: food safety leads, guest CRM hidden. Your group sets which categories appear, their order, and what to keep off this screen entirely.<\u002Fdiv>\n       <\u002Fdiv>\n     <\u002Fdiv>\n   <\u002Fsc-if>\n\n   <!-- QUIET DAY -->\n   <sc-if value=\"{{doorQuiet}}\" hint-placeholder-val=\"{{false}}\">\n     <div style=\"margin-top:46px;text-align:center;padding:14px 10px 6px;\">\n       <div aria-hidden=\"true\" style=\"display:inline-flex;width:54px;height:54px;align-items:center;justify-content:center;border-radius:50%;background:#eaf1ed;color:#2f6b4f;\">{{checkIcon}}<\u002Fdiv>\n       <div class=\"cs\" style=\"font-size:27px;font-weight:700;color:#15293f;margin-top:16px;\">You are on plan this week.<\u002Fdiv>\n       <div style=\"font-size:15px;color:#6f7d8c;margin-top:11px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.55;\">{{doorView.sub}}<\u002Fdiv>\n     <\u002Fdiv>\n     <div style=\"margin-top:26px;border:1px solid #e6e0d4;border-radius:11px;background:#fff;padding:22px 24px;\">\n       <div style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#a3956f;\">Last week’s recommendation<\u002Fdiv>\n       <div style=\"font-size:15.5px;color:#15293f;margin-top:9px;line-height:1.55;\"> a2e;background:#fcf6ea;padding:18px 20px;border-radius:0 10px 10px 0;\">\n       <div style=\"font-size:11.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#bf8a2e;\">Before I recommend<\u002Fdiv>\n       <div class=\"cs\" style=\"font-size:24px;font-weight:700;color:#15293f;margin-top:9px;line-height:1.3;\">{{doorView.staleTitle}}<\u002Fdiv>\n       <div style=\"font-size:15px;color:#3c4a5a;margin-top:11px;line-height:1.55;\">{{doorView.sub}}<\u002Fdiv>\n       <div style=\"margin-top:16px;display:flex;gap:12px;flex-wrap:wrap;\">\n         <button type=\"button\" sc-camel-on-click=\"{{confirmDoor}}\" style=\"border:none;border-radius:9px;background:#15293f;color:#fff;font-size:14px;font-weight:600;padding:12px 18px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#22364d;\">Mark recounted<\u002Fbutton>\n         <button type=\"button\" style=\"border:1px solid #e0d8c9;background:#fff;border-radius:9px;color:#6f7d8c;font-size:14px;font-weight:600;padding:12px 18px;cursor:pointer;font-family:inherit;\" style-hover=\"background:#fff;\">Estimate from the stale count<\u002Fbutton>\n       <\u002Fdiv>\n     <\u002Fdiv>\n     <div style=\"margin-top:24px;\">\n       <div style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;\">My best estimate, working from a 4 day old count<\u002Fdiv>\n       <div style=\"margin-top:6px;\">\n         <sc-for list=\"{{doorFigures}}\" as=\"f\" hint-placeholder-count=\"2\">\n           <div style=\"border-bottom:1px solid #f1ece1;\">\n             <button type=\"button\" sc-camel-on-click=\"{{toggleFig}}\" data-fig=\"{{f.id}}\" aria-expanded=\"{{f.open}}\" style=\"width:100%;text-align:left;background:none;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 2px;\">\n               <span style=\"font-size:14.5px;color:#3c4a5a;\">{{f.label}}<\u002Fspan>\n               <span style=\"display:flex;align-items:center;gap:11px;flex:none;\">\n                 <span class=\"cs\" style=\"font-size:18px;font-weight:700;color:{{f.valColor}};border-bottom:{{f.valBorder}};padding-bottom:1px;\">{{f.value}}<\u002Fspan>\n                 <span aria-hidden=\"true\" style=\"display:inline-flex;color:#c2b7a3;font-size:11px;transform:{{f.chevronRot}};transition:transform .18s;\">▾<\u002Fspan>\n               <\u002Fspan>\n             <\u002Fbutton>\n             <sc-if value=\"{{f.open}}\" hint-placeholder-val=\"{{false}}\">\n               <div style=\"padding:0 2px 15px;\">\n                 <div style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#a3956f;margin-bottom:6px;\">{{f.statusLabel}}<\u002Fdiv>\n                 <sc-for list=\"{{f.source}}\" as=\"ln\" hint-placeholder-count=\"2\">\n                   <div style=\"font-size:13.5px;color:#5a6675;line-height:1.5;margin-top:3px;\">{{ln.t}}<\u002Fdiv>\n                 <\u002Fsc-for>\n               <\u002Fdiv>\n             <\u002Fsc-if>\n           <\u002Fdiv>\n         <\u002Fsc-for>\n       <\u002Fdiv>\n     <\u002Fdiv>\n   <\u002Fsc-if>\n\n <\u002Fdiv>\n <\u002Fsc-if>\n\n <!-- ===================== OPENING CHECKLIST ===================== -->\n <sc-if value=\"{{isTasks}}\" hint-placeholder-val=\"{{false}}\">\n <div data-screen-label=\"Opening checklist\" style=\"max-width:740px;margin:0 auto;padding:22px 24px 72px;\">\n   <button type=\"button\" sc-camel-on-click=\"{{setView}}\" data-view=\"door\" style=\"border:1px solid #e0d8c9;background:#fff;border-radius:9px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:#6f7d8c;padding:8px 13px;margin-bottom:20px;\" style-hover=\"background:#f7f4ee;\">← Back to the front door<\u002Fbutton>\n\n   <div style=\"font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#a3956f;\">Today, before you open<\u002Fdiv>\n   <div class=\"cs\" style=\"font-size:23px;font-weight:700;color:#15293f;margin-top:5px;\">Opening checklist<\u002Fdiv>\n   <div style=\"font-size:13px;color:#9aa0a8;margin-top:3px;\">Outlet 117, Naas Road · your role based list, set by your group<\u002Fdiv>\n\n   <div style=\"display:flex;align-items:baseline;gap:10px;margin-top:16px;flex-wrap:wrap;\">\n     <span class=\"cs\" style=\"font-size:22px;font-weight:700;color:#15293f;letter-spacing:-.01em;\">{{taskDoneN}} of {{taskTotal}}<\u002Fspan>\n     <span style=\"font-size:13.5px;color:#6f7d8c;\">signed off across the outlet<\u002Fspan>\n   <\u002Fdiv>\n   <div style=\"margin-top:9px;height:7px;background:#efe7d4;border-radius:4px;overflow:hidden;\">\n     <div style=\"height:100%;width:{{taskPct}};background:#bf8a2e;border-radius:4px;\"><\u002Fdiv>\n   <\u002Fdiv>\n\n   <div style=\"font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#a3a9b1;margin-top:24px;\">Outstanding<\u002Fdiv>\n   <div style=\"margin-top:8px;border-top:1px solid #ebe6da;\">\n     <sc-for list=\"{{taskOutstanding}}\" as=\"t\" hint-placeholder-count=\"5\">\n       <button type=\"button\" sc-camel-on-click=\"{{toggleTask}}\" data-task=\"{{t.id}}\" style=\"width:100%;text-align:left;background:none;border:none;border-bottom:1px solid #ebe6da;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:14px;padding:15px 4px;\" style-hover=\"background:#faf8f3;\">\n         <span aria-hidden=\"true\" style=\"flex:none;width:20px;height:20px;border-radius:50%;border:2px solid {{t.catColor}};\"><\u002Fspan>\n         <span style=\"flex:1;min-width:0;\">\n           <span style=\"display:block;font-size:15px;font-weight:600;color:#15293f;line-height:1.35;\">{{t.title}}<\u002Fspan>\n           <span style=\"display:block;font-size:12px;color:#9aa0a8;margin-top:2px;\">{{t.role}} · due {{t.due}}<\u002Fspan>\n         <\u002Fspan>\n         <span style=\"flex:none;font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:{{t.catColor}};\">{{t.cat}} s<\u002Fspan>\n     <span style=\"font-size:13px;font-weight:600;color:#15293f;\">{{pathway.vas}}<\u002Fspan>\n     <span style=\"font-size:12.5px;color:#a3a9b1;\">· {{pathway.ctx}}<\u002Fspan>\n   <\u002Fdiv>\n\n   <!-- beat header -->\n   <div style=\"display:flex;align-items:center;gap:9px;margin-top:26px;\">\n     <div style=\"display:flex;gap:6px;\">\n       <sc-for list=\"{{pathway.dots}}\" as=\"d\" hint-placeholder-count=\"4\">\n         <span style=\"width:8px;height:8px;border-radius:50%;background:{{d.fill}};\"><\u002Fspan>\n       <\u002Fsc-for>\n     <\u002Fdiv>\n     <span style=\"font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#8a94a0;\">{{pathway.kicker}}<\u002Fspan>\n   <\u002Fdiv>\n   <div class=\"cs\" style=\"font-size:30px;font-weight:700;color:#15293f;margin-top:11px;line-height:1.15;\">{{pathway.title}}<\u002Fdiv>\n   <div style=\"font-size:14.5px;color:#6f7d8c;margin-top:9px;line-height:1.55;max-width:600px;\">{{pathway.sub}}<\u002Fdiv>\n\n   <!-- ===== ORDERING BEAT 1: COUNT ===== -->\n   <sc-if value=\"{{pathway.po1}}\" hint-placeholder-val=\"{{false}}\">\n     <div style=\"margin-top:24px;border:1px solid #e6e0d4;background:#fff;border-radius:12px;padding:34px 24px;text-align:center;\">\n       <sc-if value=\"{{pathway.countReady}}\" hint-placeholder-val=\"{{true}}\">\n         <div style=\"display:inline-flex;align-items:center;gap:8px;font-size:13px;color:#8a94a0;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#c2b7a3;\"><\u002Fspan> Ready to count<\u002Fdiv>\n         <button type=\"button\" sc-camel-on-click=\"{{startCount}}\" aria-label=\"Tap to start counting\" style=\"display:block;margin:20px auto 0;width:84px;height:84px;border-radius:50%;border:none;background:#15293f;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;\" style-hover=\"background:#22364d;\">{{micIcon}}<\u002Fbutton>\n         <div style=\"font-size:13.5px;color:#6f7d8c;margin-top:18px;\">Tap to start · speak item and quantity<\u002Fdiv>\n       <\u002Fsc-if>\n       <sc-if value=\"{{pathway.countCounting}}\" hint-placeholder-val=\"{{false}}\">\n         <div style=\"display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#2f6b4f;\"><span style=\"width:9px;height:9px;border-radius:50%;background:#2f6b4f;\"><\u002Fspan> Listening<\u002Fdiv>\n         <div style=\"position:relative;width:84px;height:84px;margin:20px auto 0;display:inline-flex;align-items:center;justify-content:center;\">\n           <span aria-hidden=\"true\" style=\"position:absolute;inset:0;border-radius:50%;background:#2f6b4f;opacity:.3;animation:soPulse 1.5s ease-out infinite;\"><\u002Fspan>\n           <span style=\"position:relative;width:84px;height:84px;border-radius:50%;background:#2f6b4f;color:#fff;display:inline-flex;align-items:center;justify-content:center;\">{{micIcon}}<\u002Fspan>\n         <\u002Fdiv>\n         <div style=\"font-size:14px;color:#15293f;margin-top:18px;font-weight:600;\">Cheddar cheese, 39 kilos<\u002Fdiv>\n         <div style=\"font-size:13px;color:#8a94a0;margin-top:4px;\">3 items counted · keep going, or move on<\u002Fdiv>\n       <\u002Fsc-if>\n     <\u002Fdiv>\n     <div style=\"margin-top:14px;display:flex;align-items:flex-start;gap:11px;background:#eef1f5;border:1px solid #d6deea;border-radius:10px;padding:13px 15px;\">\n       <span style=\"flex:none;font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;background:#15293f;border-radius:4px;padding:4px 7px;margin-top:1px;\">AI ordering · ML<\u002Fspan>\n       <span style=\"font-size:13px;color:#3c4a5a;line-height:1.5;\">Tonight’s order forecast updates when your count is submitted. Machine learning on sales and stock history, not a chatbot. Your confirmation is always required before any order is placed.<\u002Fspan>\n     <\u002Fdiv>\n   <\u002Fsc-if>\n\n   <!-- ===== ORDERING BEAT 2: MARGIN LEAK ===== -->\n   <sc-if value=\"{{pathway.po2}}\" hint-placeholder-val=\"{{false}}\">\n     <div style=\"margin-top:24px;border:1px solid #e6e0d4;background:#fff;border-radius:12px;overflow:hidden;\">\n       <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;border-bottom:1px solid #f1ece1;\">\n         <span style=\"font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#a3956f;\">Cheese · this week · Outlet 117<\u002Fspan>\n         <span style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#b23a2e;border:1px solid #e3b3ad;border-radius:5px;padding:3px 8px;\">Leak detected<\u002Fspan>\n       <\u002Fdiv>\n       <div style=\"display:grid;grid-template-columns:1fr 1fr;\">\n         <div style=\"padding:18px;border-right:1px solid #f1ece1;\">\n           <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;\">Should have used<\u002Fdiv>\n           <div class=\"cs\" style=\"font-size:30px;font-weight:700;color:#15293f;margin-top:7px;\">34.2 kg<\u002Fdiv>\n           <div style=\"font-size:12px;color:#8a94a0;margin-top:4px;\">recipes × sales volume<\u002Fdiv>\n         <\u002Fdiv>\n         <div style=\"padding:18px;\">\n           <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;\">Actually used<\u002Fdiv>\n           <div class=\"cs\" style=\"font-size:30px;font-weight:700;color:#b23a2e;margin-top:7px;\">39.1 kg<\u002Fdiv>\n           <div style=\"font-size:12px;color:#8a94a0;margin-top:4px;\">count + purchase orders<\u002Fdiv>\n         <\u002Fdiv>\n       <\u002Fdiv>\n     <\u002Fdiv>\n     <div style=\"margin-top:14px;border-left:3px solid #b23a2e;background:#fdf3f2;border-radius:0 10px 10px 0;padding:15px 17px;\">\n       <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#b23a2e;\">The gap · financial value<\u002Fdiv>\n       <div class=\"cs\" style=\"font-size:22px;font-weight:700;color:#b23a2e;margin-top:7px;\">4.9 kg over · $48.02 this week<\u002Fdiv>\n       <div style=\"font-size:13px;color:#3c4a5a;line-height:1.55;margin-top:9px;\">This outlet is using 14% more cheese than its sales explain. At $9.80 a kg that is $48 wasted this week, $2,500 annualised at this outlet alone. A payment platform can estimate the first number from till sales. It physically cannot see the second, a card reader never counts your fridge.<\u002Fdiv>\n     <\u002Fdiv>\n     <div style=\"margin-top:14px;border:1px solid #e6e0d4;border-radius:11px;overflow:hidden;\">\n       <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr 1fr;gap:8px;padding:11px 14px;background:#faf8f3;border-bottom:1px solid #f1ece1;\">\n         <span style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;\">Ingredient<\u002Fspan>\n         <span style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;text-align:right;\">Should<\u002Fspan>\n         <span style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;text-align:right;\">Actual<\u002Fspan>\n         <span style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;text-align:right;\">Variance<\u002Fspan>\n         <span style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#a3a9b1;text-align:right;\">£ leak/wk<\u002Fspan>\n       <\u002Fdiv>\n       <sc-for list=\"{{leakRows}}\" as=\"r\" hint-placeholder-count=\"3\">\n         <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr 1fr;gap:8px;padding:13px 14px;border-bottom:1px solid #f3efe6;border-left:3px solid {{r.accent}};align-items:center;\">\n           <span style=\"font-size:13.5px;font-weight:600;color:#15293f;\">{{r.ing}}<\u002Fspan>\n           <span style=\"font-size:13px;color:#3c4a5a;text-align:right;\">{{r.should}}<\u002Fspan>\n           <span style=\"font-size:13px;color:{{r.actualColor}};text-align:right;\">{{r.actual}}<\u002Fspan>\n           <span style=\"font-size:13px;color:{{r.varColor}};text-align:right;\">{{r.variance}}<\u002Fspan>\n           <span class=\"cs\" style=\"font-size:13.5px;font-weight:700;color:{{r.leakColor}};text-align:right;\">{{r.leak}}<\u002Fspan>\n         <\u002Fdiv>\n       <\u002Fsc-for>\n     <\u002Fdiv>\n   <\u002Fsc-if>\n\n   <!-- ===== ORDERING BEAT 3: FIX THE ORDER ===== -->\n   <sc-if value=\"{{pathway.po3}}\" hint-placeholder-val=\"{{false}}\">\n     <sc-if value=\"{{pathway.placed}}\" hint-placeholder-val=\"{{false}}\">\n       <div style=\"margin-top:20px;display:flex;align-items:flex-start;gap:11px;background:#2f6b4f;border-radius:11px;padding:15px 18px;\">\n         <span aria-hidden=\"true\" style=\"flex:none;color:#fff;margin-top:1px;\">{{checkIconWhite}}<\u002Fspan>\n         <span style=\"font-size:14px;color:#fff;line-height:1.5;\"><strong>Order placed.<\u002Fstrong> Adjusted quantities sent to supplier. Portioning flag sent to manager. Cash flow impact logged below.<\u002Fspan>\n       <\u002Fdiv>\n     <\u002Fsc-if>\n     <div style=\"margin-top:18px;border:1px solid #e6e0d4;background:#fff;border-radius:12px;padding:18px;\">\n       <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;\">\n         <div style=\"min-width:0;flex:1;\">\n           <div style=\"font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#a3956f;\">Order proposal<\u002Fdiv>\n           <div style=\"font-size:13.5px;color:#3c4a5a;line-height:1.5;margin-top:7px;max-width:440px;\">Quantities trimmed to recipe standard using the ML demand forecast. A proposal, nothing sent yet.<\u002Fdiv>\n         <\u002Fdiv>\n         <span style=\"flex:none;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#15293f;b
